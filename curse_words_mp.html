function extractWord(board,la,r,c,dir){let wl=la,wr=r,wc=c;while(true){const nl=dir==="V"?wr-1:wr,nc=dir==="H"?wc-1:wc;if(nl<0||nc<0)break;if(!board[wl][nl][nc].letter)break;wr=nl;wc=nc;}const cells=[];while(wl<LY&&wr<RW&&wc<CL&&board[wl][wr][wc].letter){cells.push({layer:wl,row:wr,col:wc});if(dir==="V")wr++;else wc++;}if(cells.length<2)return null;return{word:cells.map(({row:r,col:c})=>board[wl][r][c].letter).join(""),cells,dir,layer:wl};}
function findWords(board,placed){if(!placed.length)return[];const rows=[...new Set(placed.map(p=>p.row))],cols=[...new Set(placed.map(p=>p.col))];const isH=rows.length===1&&cols.length>0;const seen=new Set(),res=[];const add=w=>{if(!w)return;const k=`${w.layer}-${w.dir}-${w.cells[0].row}-${w.cells[0].col}`;if(!seen.has(k)){seen.add(k);res.push(w);}};const p0=placed[0];add(extractWord(board,p0.layer,p0.row,p0.col,isH?"H":"V"));for(const{layer,row,col}of placed)add(extractWord(board,layer,row,col,isH?"V":"H"));return res;}
function validatePlace(staged,board,isFirst){if(!staged.length)return{ok:false,reason:"No tiles."};const rows=[...new Set(staged.map(p=>p.row))],cols=[...new Set(staged.map(p=>p.col))],layers=[...new Set(staged.map(p=>p.layer))];const isH=rows.length===1&&cols.length>0,isV=cols.length===1&&rows.length>0;if(!isH&&!isV)return{ok:false,reason:"Must be a single line."};const layer=layers[0];const sorted=[...staged].sort((a,b)=>isH?a.col-b.col:a.row-b.row);const lo=isH?sorted[0].col:sorted[0].row,hi=isH?sorted.at(-1).col:sorted.at(-1).row;for(let i=lo;i<=hi;i++){const r=isH?rows[0]:i,c=isH?i:cols[0];if(!board[layer][r][c].letter&&!staged.some(p=>p.row===r&&p.col===c))return{ok:false,reason:`Gap at ${isH?"col":"row"} ${i}.`};}if(staged.some(({layer,row,col})=>board[layer][row][col].letter))return{ok:false,reason:"Tile already there."};if(isFirst){const hasTiles=board[ML].some(row=>row.some(c=>c.letter));if(!hasTiles){if(layer!==ML)return{ok:false,reason:`First word: layer ${ML}.`};const ok=isH?rows[0]===CR&&Math.min(...cols)<=CR&&Math.max(...cols)>=CR:cols[0]===CR&&Math.min(...rows)<=CR&&Math.max(...rows)>=CR;if(!ok)return{ok:false,reason:"First word must cross center."};return{ok:true};}}const adj=staged.some(({layer,row,col})=>[[row-1,col],[row+1,col],[row,col-1],[row,col+1]].some(([nr,nc])=>nr>=0&&nr<RW&&nc>=0&&nc<CL&&board[layer][nr][nc].letter));if(!adj)return{ok:false,reason:"Must connect to existing tile."};return{ok:true};}
function cntAdjLong(board,placed,words,min=5){const bk=new Set();placed.forEach(({layer,row,col})=>{[[row-1,col],[row+1,col],[row,col-1],[row,col+1]].forEach(([nr,nc])=>{if(nr>=0&&nr<RW&&nc>=0&&nc<CL&&board[layer][nr][nc].letter)bk.add(`${layer},${nr},${nc}`);});});const fk=new Set(words.flatMap(w=>w.cells.map(c=>`${c.layer},${c.row},${c.col}`)));let cnt=0;const counted=new Set();for(const key of bk){if(fk.has(key))continue;const[la,r,c]=key.split(",").map(Number);for(const dir of["H","V"]){const w=extractWord(board,la,r,c,dir);if(!w||w.word.length<min)continue;const wk=`${w.layer}-${w.dir}-${w.cells[0].row}-${w.cells[0].col}`;if(!counted.has(wk)&&w.cells.some(wc=>placed.some(pc=>Math.abs(pc.row-wc.row)+Math.abs(pc.col-wc.col)===1))){counted.add(wk);cnt++;}}}return cnt;}

function cntJ(nT,board){const adj=new Set();nT.forEach(({row,col})=>{[[row-1,col],[row+1,col],[row,col-1],[row,col+1]].forEach(([nr,nc])=>{if(nr>=0&&nr<RW&&nc>=0&&nc<CL&&board[ML][nr][nc].letter)adj.add(`${nr},${nc}`);});});return adj.size;}
function findAiPlay(letters,board,isFirst,maxLen=null,singleJ=false){
  const av=letters.map(l=>l.toUpperCase());
  if(isFirst){const cands=[];for(const word of WS){const up=word.toUpperCase();if(up.length<2||up.length>av.length||(maxLen&&up.length>maxLen))continue;const pool=[...av];let ok=true;for(const ch of up){const i=pool.indexOf(ch);if(i===-1){ok=false;break;}pool.splice(i,1);}if(ok)cands.push(up);}cands.sort((a,b)=>b.length-a.length);for(const word of cands){const st=CR-Math.floor(word.length/2);if(st<0||st+word.length>CL)continue;let cl=true;for(let i=0;i<word.length;i++)if(board[ML][CR][st+i].letter){cl=false;break;}if(!cl)continue;return{word,placements:[...word].map((l,i)=>({row:CR,col:st+i,letter:l}))};} return null;}
  const ex=[];board[ML].forEach((row,r)=>row.forEach((cell,c)=>{if(cell.letter)ex.push({r,c,letter:cell.letter});}));
  if(!ex.length)return null;
  const aw=[...WS].map(w=>w.toUpperCase()).filter(w=>w.length>=2&&(!maxLen||w.length<=maxLen)).sort((a,b)=>b.length-a.length);
  for(const word of aw){for(const tile of ex){
    for(const[getA,getB,setter]of[[(t)=>t.c,(t)=>tile.r,(i)=>({row:tile.r,col:i,letter:word[i-Math.min(tile.c-0,CL-word.length)]})],null]){
      if(!getA)continue;

        const sc_=tile.c-off;if(sc_<0||sc_+word.length>CL)continue;
        const nT=[];let vld=true;
        for(let i=0;i<word.length;i++){const cell=board[ML][tile.r][sc_+i];if(cell.letter){if(cell.letter!==word[i]){vld=false;break;}}else nT.push({row:tile.r,col:sc_+i,letter:word[i]});}
        if(!vld||!nT.length)continue;if(singleJ&&cntJ(nT,board)>1)continue;
        const pool=[...av];let lo=true;for(const t of nT){const i=pool.indexOf(t.letter);if(i===-1){lo=false;break;}pool.splice(i,1);}
        if(lo)return{word,placements:nT};
      }
      break;
    }
    for(let off=0;off<word.length;off++){if(word[off]!==tile.letter)continue;
      // Vertical
      const sr=tile.r-off;if(sr<0||sr+word.length>RW)continue;
      const nT=[];let vld=true;
      for(let i=0;i<word.length;i++){const cell=board[ML][sr+i][tile.c];if(cell.letter){if(cell.letter!==word[i]){vld=false;break;}}else nT.push({row:sr+i,col:tile.c,letter:word[i]});}
      if(!vld||!nT.length)continue;if(singleJ&&cntJ(nT,board)>1)continue;
      const pool=[...av];let lo=true;for(const t of nT){const i=pool.indexOf(t.letter);if(i===-1){lo=false;break;}pool.splice(i,1);}
      if(lo)return{word,placements:nT};
    }
  }}
  return null;
}

    {id:"skeletal_warrior",name:"Skeletal Warrior",icon:"💀",lv:3,passive:true,cost:0,desc:"After each turn, warrior attempts a 3–4 letter word from graveyard."}],icon:()=><Spr.necromancer/>},
  morphologist:{id:"morphologist",name:"Morphologist",hp:85,color:"#f97316",accent:"#c2410c",passive:{id:"empty_mind",name:"Empty Mind",desc:"Exchange entire hand → draw 3 extra tiles."},abilities:[
    {id:"blind_fury",name:"Mantis Style",icon:"🦗",lv:2,passive:false,cost:0,desc:"ON: multi-word plays deal double damage."},
    {id:"tiger_style",name:"Tiger Style",icon:"🐯",lv:2,passive:false,cost:0,desc:"ON: 2 words = opp. loses 1 tile; 3+ = opp. loses 2."},
    {id:"crane_style",name:"Crane Style",icon:"🦢",lv:2,passive:false,cost:0,desc:"ON: every 5 dmg dealt = 1 dmg reduction next incoming."},
    {id:"snake_style",name:"Snake Style",icon:"🐍",lv:2,passive:false,cost:0,desc:"ON: 6-letter word disables 1 opp. ability; 7-letter disables 2."},
    {id:"dragon_style",name:"Dragon Style",icon:"🐉",lv:3,passive:true,cost:0,desc:"PASSIVE: multiple styles active simultaneously."}],icon:()=><Spr.morphologist/>},
};
const CL_LIST=Object.values(CLS);
const hSz=id=>id==="warlord"?9:7;
const gyCap=ua=>ua.includes("graveyard_expansion")?5:3;
// ── Auth State ────────────────────────────────────────────────────────────
function startUA(cid){
  const cls=CLS[cid],lv1=cls.abilities.filter(ab=>ab.lv===1);
  return cid==="morphologist"?["empty_mind"]:lv1.length===1?[lv1[0].id]:[];
}
function initGY(cid){return cid!=="necromancer"?[]:Array.from({length:3},(_,i)=>({id:`gy0_${i}`,letter:rndL(),stealthy:false}));}
function initAuth(c0,c1){
  const deck=mkDeck();
  const{h:h0,d:d1}=drawN(deck,hSz(c0),c0);
  const{h:h1,d:d2}=drawN(d1,hSz(c1),c1);
  return{
    board:emptyBoard(),deck:d2,
    hands:[h0,h1],graveyards:[initGY(c0),initGY(c1)],
    classIds:[c0,c1],hp:[CLS[c0].hp,CLS[c1].hp],maxHP:[CLS[c0].hp,CLS[c1].hp],
    mana:[0,0],xp:[0,0],ua:[startUA(c0),startUA(c1)],
    secretWords:[null,null],pendingLU:[null,null],
    isFirstWord:[true,true],
    whoseTurn:0,turnPhase:"play",
    lastPlay:null, // {pi,words,cells,dmg,pFire,pFreeze,pTiger,pSnake}
    fadeShield:[false,false],sbCooldown:[0,0],craneRed:[0,0],
    lightArmed:[false,false],fireArmed:[false,false],iceArmed:[false,false],
    mantisOn:[false,false],tigerOn:[false,false],craneOn:[false,false],snakeOn:[false,false],
    disabledUA:[[], []],disabledLeft:[0,0],
    smokeBombMode:[false,false],
    log:[],
  };
}
// ── processAction (pure reducer) ──────────────────────────────────────────
function lvUp(s,pi,xpAdd){
  const ua=[...s.ua.map(a=>[...a])],plu=[...s.pendingLU];
  const oldLv=lvX(s.xp[pi]),newXP=s.xp[pi]+xpAdd,newLv=lvX(newXP);
  if(newLv>oldLv){
    const cls=CLS[s.classIds[pi]];
    const choices=cls.abilities.filter(ab=>{
      if(ab.lv!==newLv||ua[pi].includes(ab.id)||ab.notAvailable)return false;
      if(ab.lv>=3){const hp=cls.abilities.some(a=>a.lv===ab.lv-1&&ua[pi].includes(a.id));if(!hp)return false;}
      return true;
    });
    if(choices.length===1)ua[pi].push(choices[0].id);
    else if(choices.length>1)plu[pi]={level:newLv,choices};
  }
  const newXPs=[...s.xp];newXPs[pi]=newXP;
  return{ua,plu,newXPs};
}

function processAction(s,action,pi){
  const oi=1-pi;
  switch(action.type){

  case"PLAY_WORD":{
    const{staged}=action;
    const cid=s.classIds[pi],ua=s.ua[pi],secret=s.secretWords[pi];
    const nb=s.board.map(lay=>lay.map(r=>r.map(c=>({...c}))));
    const placed=staged.map(({letter,layer,row,col,stealthy})=>{nb[layer][row][col]={letter,owner:pi===0?"p0":"p1",stealthy:!!stealthy};return{layer,row,col};});
    const words=findWords(nb,placed);
    if(!words.length)return s;
    const primary=words[0].word;
    let dmg=0,manaG=0,xpG=0;
    words.forEach(w=>{
      let d=scW(w.word);
      if(cid==="warlord"&&ua.includes("big_word_mastery")&&w.word.length>=6)d+=5;
      if(cid==="warlord"&&ua.includes("syllabic_strikes")){const sy=syl(w.word);if(sy>=3)d+=6;else if(sy===2)d+=2;}
      if(cid==="dyslexic"&&secret&&ua.includes("secret_word")){const vv=gvars(w.word,cid,ua),sv=gvars(secret,cid,ua);if(vv.some(v=>sv.some(x=>v===x)))d+=40;}
      dmg+=d;if(cid==="arcanist")manaG+=Math.max(0,w.word.length-4);xpG+=xpW(w.word);
    });
    if(s.lightArmed[pi])dmg+=cntAdjLong(nb,placed,words)*3;
    if(s.mantisOn[pi]&&words.length>1)dmg*=2;
    if(cid==="dyslexic"&&ua.includes("onomatopoeia")&&isOnom(primary))dmg+=cntAdjLong(nb,placed,words)*3;
    const usedIds=new Set(staged.map(p=>p.handId));
    const gyUsed=staged.filter(p=>p.fromGraveyard).length;
    const remH=s.hands[pi].filter(t=>!usedIds.has(t.id));
    const remGY=s.graveyards[pi].filter(t=>!usedIds.has(t.id));
    const{h:drawn,d:nd}=drawN(s.deck,hSz(cid)-remH.length,cid);
    const newHand=[...remH,...drawn.map((t,i)=>({...t,id:`h${Date.now()}_${pi}_${i}`}))].map(t=>({...t,burning:false,frozenTurns:t.frozenTurns>0?t.frozenTurns-1:0}));
    const newHands=[...s.hands];newHands[pi]=newHand;
    const newMana=[...s.mana];if(cid==="arcanist")newMana[pi]=Math.min(10,newMana[pi]+manaG);
    const newHP=[...s.hp];
    if(cid==="necromancer"&&ua.includes("life_drain")&&gyUsed>=2)newHP[pi]=Math.min(s.maxHP[pi],newHP[pi]+Math.floor(dmg/2));
    const{ua:newUA,plu:newPLU,newXPs}=lvUp(s,pi,xpG);
    const pFire=s.fireArmed[pi]?(primary.length>=6?3:primary.length===5?2:primary.length===4?1:0):0;
    const pFreeze=s.iceArmed[pi]?(primary.length>=5?2:primary.length===4?1:0):0;
    const pTiger=s.tigerOn[pi]&&ua.includes("tiger_style")?(words.length>=3?2:words.length>=2?1:0):0;
    const pSnake=s.snakeOn[pi]&&ua.includes("snake_style")?(primary.length>=7?2:primary.length>=6?1:0):0;
    const nLA=[...s.lightArmed];nLA[pi]=false;const nFA=[...s.fireArmed];nFA[pi]=false;const nIA=[...s.iceArmed];nIA[pi]=false;
    const nSB=[...s.sbCooldown];nSB[pi]=Math.max(0,nSB[pi]-1);
    const nCR=[...s.craneRed];if(s.craneOn[pi]&&ua.includes("crane_style"))nCR[pi]=Math.floor(dmg/5);
    const newGY=[...s.graveyards];newGY[pi]=remGY;
    const nSBM=[...s.smokeBombMode];nSBM[pi]=false;
    return{...s,board:nb,deck:nd,hands:newHands,graveyards:newGY,mana:newMana,xp:newXPs,hp:newHP,
      ua:newUA,pendingLU:newPLU,lightArmed:nLA,fireArmed:nFA,iceArmed:nIA,
      sbCooldown:nSB,craneRed:nCR,fadeShield:nFS,smokeBombMode:nSBM,
      isFirstWord:s.isFirstWord.map((v,i)=>i===pi?false:v),
      whoseTurn:oi,turnPhase:"challenge",
      lastPlay:{pi,oi,words,cells:placed,dmg,pFire,pFreeze,pTiger,pSnake},
      log:[`P${pi+1} played "${primary}"${words.length>1?` +${words.length-1} word${words.length>2?"s":""}`:""}→${dmg}dmg`,...s.log].slice(0,20)};
  }

  case"CHALLENGE":{
    const lp=s.lastPlay;if(!lp)return s;
    const{pi:actPI,oi:actOI,words}=lp;
    const cid=s.classIds[actPI],ua=s.ua[actPI],secret=s.secretWords[actPI];
    const invalid=words.filter(w=>!isValid(w.word,cid,ua,secret));
    if(invalid.length){
      const keys=new Set(lp.cells.map(c=>`${c.layer},${c.row},${c.col}`));
      const nb=s.board.map((lay,li)=>lay.map((row,ri)=>row.map((cell,ci)=>{return keys.has(`${li},${ri},${ci}`)?{letter:null,owner:null,stealthy:false}:cell;})));
      const pen=words.reduce((sum,w)=>sum+scW(w.word),0);
      const hasBS=s.ua[pi].includes("backstab");
      const cDmg=Math.floor(pen*(hasBS?1.5:1)),cXP=Math.floor(words.reduce((a,w)=>a+xpW(w.word),0)*(hasBS?1.5:1));
      const newHP=[...s.hp];newHP[actPI]=Math.max(0,newHP[actPI]-cDmg);
      const{ua:newUA,plu:newPLU,newXPs}=lvUp({...s,ua:[...s.ua.map(a=>[...a])],pendingLU:[...s.pendingLU]},pi,cXP);
      return{...s,board:nb,hp:newHP,ua:newUA,pendingLU:newPLU,xp:newXPs,
        whoseTurn:pi,turnPhase:"play",lastPlay:null,
        log:[`⚔ P${pi+1} challenged! Word invalid → -${cDmg}HP to P${actPI+1}${hasBS?" 🗡️":""}`,...s.log].slice(0,20)};
    }else{
      const pen=lp.dmg+10;const newHP=[...s.hp];newHP[pi]=Math.max(0,newHP[pi]-pen);
      return{...s,hp:newHP,whoseTurn:pi,turnPhase:"play",lastPlay:null,
        log:[`⚔ P${pi+1} challenged and FAILED — -${pen}HP`,...s.log].slice(0,20)};
    }
  }

  case"PASS":{
    const lp=s.lastPlay;if(!lp)return s;
    let dmg=lp.dmg;
    if(s.ua[pi].includes("platemail")&&lp.words.some(w=>w.word.length>=6))dmg=Math.max(0,dmg-2);
    dmg=Math.max(0,dmg-s.craneRed[pi]);
    if(s.fadeShield[pi])dmg=0;
    const newHP=[...s.hp];newHP[pi]=Math.max(0,newHP[pi]-dmg);
    const newHands=[...s.hands.map(h=>[...h])];
    if(lp.pFire>0){const unb=newHands[pi].map((t,i)=>({...t,i})).filter(t=>!t.burning);const cnt=Math.min(lp.pFire,unb.length);unb.sort(()=>Math.random()-.5).slice(0,cnt).forEach(t=>{newHands[pi][t.i]={...newHands[pi][t.i],burning:true};});}
    if(lp.pFreeze>0){const unf=newHands[pi].map((t,i)=>({...t,i})).filter(t=>!(t.frozenTurns>0));const cnt=Math.min(lp.pFreeze,unf.length);unf.sort(()=>Math.random()-.5).slice(0,cnt).forEach(t=>{newHands[pi][t.i]={...newHands[pi][t.i],frozenTurns:2};});}
    if(lp.pTiger>0){const rem=newHands[pi].map((t,i)=>({...t,i})).filter(t=>!t.burning&&!(t.frozenTurns>0));const cnt=Math.min(lp.pTiger,rem.length);const toRm=new Set(rem.sort(()=>Math.random()-.5).slice(0,cnt).map(t=>t.i));newHands[pi]=newHands[pi].filter((_,i)=>!toRm.has(i));}
    let newDisUA=[...s.disabledUA],newDisLeft=[...s.disabledLeft];
    if(lp.pSnake>0){const oppAbs=CLS[s.classIds[pi]].abilities.filter(ab=>!ab.notAvailable);const toDisable=oppAbs.sort(()=>Math.random()-.5).slice(0,Math.min(lp.pSnake,oppAbs.length)).map(ab=>ab.id);if(toDisable.length){newDisUA[pi]=toDisable;newDisLeft[pi]=1;}}
    const nFS=[...s.fadeShield];nFS[pi]=false;
    // Fade into Shadows: word-player played invalid word and it went unchallenged → they get a shield
    const wordPlayer=lp.pi,wordCid=s.classIds[wordPlayer],wordUA=s.ua[wordPlayer],wordSecret=s.secretWords[wordPlayer];
    if(wordUA.includes("fade_into_shadows")&&lp.words.some(w=>!isValid(w.word,wordCid,wordUA,wordSecret)))
      nFS[wordPlayer]=true;
    const nCR=[...s.craneRed];nCR[pi]=0;
    // necromancer skeletal warrior fires after pass
    const doMinion=s.ua[lp.pi].includes("skeletal_warrior")&&s.graveyards[lp.pi].length>=2;
    let ns={...s,hp:newHP,hands:newHands,fadeShield:nFS,craneRed:nCR,
      disabledUA:newDisUA,disabledLeft:newDisLeft,
      whoseTurn:pi,turnPhase:"play",lastPlay:null,
      log:[`P${pi+1} passed — ${dmg}dmg`,...s.log].slice(0,20)};
    if(doMinion)ns=runMinion(ns,lp.pi);
    // Decrement disabled-ability counter for the player whose abilities were disabled (pi, the passer)
    const ndl=[...ns.disabledLeft];const ndua=[...ns.disabledUA];
    if(ndl[pi]>0){ndl[pi]--;if(ndl[pi]===0)ndua[pi]=[];}
    ns={...ns,disabledLeft:ndl,disabledUA:ndua};
    return ns;
  }

  case"EXCHANGE":{
    const{ids,all}=action;
    const cid=s.classIds[pi],ua=s.ua[pi];
    const keeping=s.hands[pi].filter(t=>!ids.includes(t.id));
    const returning=s.hands[pi].filter(t=>ids.includes(t.id)).map(t=>t.letter);
    const emptyMind=cid==="morphologist"&&ua.includes("empty_mind")&&all;
    const drawCount=returning.length+(emptyMind?3:0);
    const nd=[...s.deck,...returning].sort(()=>Math.random()-.5);
    const{h:drawn,d:nd2}=drawN(nd,drawCount,cid);
    const newHand=[...keeping,...drawn.map((t,i)=>({...t,id:`ex${Date.now()}_${pi}_${i}`}))];
    const newHands=[...s.hands];newHands[pi]=newHand;
    let newGY=[...s.graveyards];
    if(cid==="necromancer"){const cap=gyCap(ua),sp=cap-newGY[pi].length;if(sp>0){const add=returning.slice(0,sp).map((l,i)=>({id:`gy_ex${Date.now()}_${i}`,letter:l,stealthy:false}));newGY=[...s.graveyards];newGY[pi]=[...newGY[pi],...add];}}
    const nSB=[...s.sbCooldown];nSB[pi]=Math.max(0,nSB[pi]-1);
    // after exchange it's opponent's turn to play
    return{...s,deck:nd2,hands:newHands,graveyards:newGY,sbCooldown:nSB,
      whoseTurn:oi,turnPhase:"play",
      log:[`P${pi+1} exchanged ${returning.length} tile${returning.length!==1?"s":""}${emptyMind?" 🧘+3":""}`,
        ...s.log].slice(0,20)};
    // Note: exchange doesn't end the turn — player still needs to play a word OR we skip to opponent
    // Actually exchange IS a full turn action: switch to opponent
    // We'll handle this by making the caller switch turns after exchange
  }

  case"SMOKE_BOMB":{
    const{layer,row,col}=action;
    const nb=s.board.map(lay=>lay.map(r=>r.map(c=>({...c}))));
    nb[layer][row][col]={...nb[layer][row][col],stealthy:true};
    const nSB=[...s.sbCooldown];nSB[pi]=2;
    const nSBM=[...s.smokeBombMode];nSBM[pi]=false;
    return{...s,board:nb,sbCooldown:nSB,smokeBombMode:nSBM,
      log:[`💨 P${pi+1} smoke-bombed a tile`,...s.log].slice(0,20)};
  }

  case"CHOOSE_ABILITY":{
    const{abilityId}=action;
    const newUA=[...s.ua.map(a=>[...a])];newUA[pi].push(abilityId);
    const newSW=[...s.secretWords];if(abilityId==="secret_word")newSW[pi]=genSW();
    const nPLU=[...s.pendingLU];nPLU[pi]=null;
    return{...s,ua:newUA,secretWords:newSW,pendingLU:nPLU,
      log:[`✨ P${pi+1} unlocked ${CLS[s.classIds[pi]].abilities.find(a=>a.id===abilityId)?.name}`,...s.log].slice(0,20)};
  }

  case"ARM":{
    const{spell}=action;
    const ua=s.ua[pi];
    if(spell==="fire"&&ua.includes("flame_mastery")&&s.mana[pi]>=2&&!s.fireArmed[pi]){
      const nm=[...s.mana];nm[pi]-=2;const na=[...s.fireArmed];na[pi]=true;
      return{...s,mana:nm,fireArmed:na,log:[`🔥 P${pi+1} armed Fireball`,...s.log].slice(0,20)};
    }if(spell==="ice"&&ua.includes("ice_mastery")&&s.mana[pi]>=2&&!s.iceArmed[pi]){
      const nm=[...s.mana];nm[pi]-=2;const na=[...s.iceArmed];na[pi]=true;
      return{...s,mana:nm,iceArmed:na,log:[`❄️ P${pi+1} armed Freeze`,...s.log].slice(0,20)};
    }if(spell==="lightning"&&ua.includes("lightning_mastery")&&s.mana[pi]>=2&&!s.lightArmed[pi]){
      const nm=[...s.mana];nm[pi]-=2;const na=[...s.lightArmed];na[pi]=true;
      return{...s,mana:nm,lightArmed:na,log:[`⚡ P${pi+1} armed Lightning`,...s.log].slice(0,20)};
    }
    return s;
  }

  case"TOGGLE_STYLE":{
    const{style}=action;
    const drag=s.ua[pi].includes("dragon_style");
    const fields={mantis:"mantisOn",tiger:"tigerOn",crane:"craneOn",snake:"snakeOn"};
    const key=fields[style];if(!key)return s;
    const toggled={...s[key]};toggled[pi]=!toggled[pi];
    // build patch: if no dragon style, turn off all other styles for this player
    const patch={[key]:toggled};
    if(!drag){
      Object.entries(fields).forEach(([sty,k])=>{
        if(k!==key){const a={...s[k]};a[pi]=false;patch[k]=a;}
      });
    }
    return{...s,...patch,log:[`${style} style ${toggled[pi]?"ON":"OFF"} for P${pi+1}`,...s.log].slice(0,20)};
  }

  case"ACTIVATE_SMOKE":{
    const nSBM=[...s.smokeBombMode];nSBM[pi]=true;
    return{...s,smokeBombMode:nSBM};
  }

  default:return s;
  }
}

// ── Skeletal Warrior ──────────────────────────────────────────────────────
function runMinion(s,pi){
  const letters=s.graveyards[pi].map(t=>t.letter);
  const result=findAiPlay(letters,s.board,false,4);
  if(!result||result.word.length<3)return s;
  const gy=[...s.graveyards[pi]];
  for(const p of result.placements){const i=gy.findIndex(t=>t.letter===p.letter);if(i===-1)return s;gy.splice(i,1);}
  const nb=s.board.map(lay=>lay.map(r=>r.map(c=>({...c}))));
  const placed=result.placements.map(p=>{nb[ML][p.row][p.col]={letter:p.letter,owner:pi===0?"p0":"p1",stealthy:false};return{layer:ML,row:p.row,col:p.col};});
  const words=findWords(nb,placed);if(!words.length)return s;
  const dmg=words.reduce((sum,w)=>sum+scW(w.word),0);
  const oi=1-pi;const newHP=[...s.hp];newHP[oi]=Math.max(0,newHP[oi]-dmg);
  const newGY=[...s.graveyards];newGY[pi]=gy;
  return{...s,board:nb,hp:newHP,graveyards:newGY,
    log:[`💀 Warrior: "${result.word}" → ${dmg}dmg`,...s.log].slice(0,20)};
}

// ── Multiplayer via PeerJS ────────────────────────────────────────────────
// Host holds authoritative state and rebroadcasts after every action.
// Guest sends actions; host processes and sends back full state.

// ── getViewState(auth, pi) — flip perspective for guest ──────────────────
function getView(auth,pi){
  if(!auth)return null;
  const oi=1-pi;
  return{
    ...auth,
    myPI:pi,
    myClass:CLS[auth.classIds[pi]],
    oppClass:CLS[auth.classIds[oi]],
    myHand:auth.hands[pi],
    oppHandCount:auth.hands[oi].length,
    oppHandDisplay:auth.hands[oi].map(t=>({...t,letter:"?",stealthy:false,burning:t.burning,frozenTurns:t.frozenTurns})),
    myGY:auth.graveyards[pi],
    myHP:auth.hp[pi],myMaxHP:auth.maxHP[pi],
    oppHP:auth.hp[oi],oppMaxHP:auth.maxHP[oi],
    myMana:auth.mana[pi],myXP:auth.xp[pi],
    myUA:auth.ua[pi],oppUA:auth.ua[oi],
    mySecret:auth.secretWords[pi],
    myPLU:auth.pendingLU[pi],
    myFade:auth.fadeShield[pi],
    mySBCool:auth.sbCooldown[pi],
    myLightArmed:auth.lightArmed[pi],myFireArmed:auth.fireArmed[pi],myIceArmed:auth.iceArmed[pi],
    myMantis:auth.mantisOn[pi],myTiger:auth.tigerOn[pi],myCrane:auth.craneOn[pi],mySnake:auth.snakeOn[pi],
    oppDisabled:auth.disabledUA[oi],
    isMyTurn:auth.whoseTurn===pi,
    isChallengeable:auth.turnPhase==="challenge"&&auth.lastPlay&&auth.lastPlay.pi!==pi,
    myCraneRed:auth.craneRed[pi],
    mySBMode:auth.smokeBombMode[pi],
    // Scrub opponent's played words from log so stealthy tiles aren't revealed
    log:auth.log.map(entry=>entry.replace(
      new RegExp(`(P${oi+1} played ")[^"]+("`),`$1???$2`
    )),
  };
}

const ICE={iceServers:[{urls:"stun:stun.l.google.com:19302"},{urls:"stun:stun1.l.google.com:19302"}]};
const waitIce=pc=>new Promise(r=>{
  if(pc.iceGatheringState==="complete")return r();
  const h=()=>{if(pc.iceGatheringState==="complete"){pc.removeEventListener("icegatheringstatechange",h);r();}};
  pc.addEventListener("icegatheringstatechange",h);
  setTimeout(r,5000);
});
// Compress SDP before encoding — cuts codes by ~65%
async function encode(obj){
  const txt=JSON.stringify(obj);
  const cs=new CompressionStream("deflate-raw");
  const w=cs.writable.getWriter();
  w.write(new TextEncoder().encode(txt));w.close();
  const chunks=[];const r=cs.readable.getReader();
  while(true){const{done,value}=await r.read();if(done)break;chunks.push(value);}
  const out=new Uint8Array(chunks.reduce((a,c)=>a+c.length,0));
  let off=0;for(const c of chunks){out.set(c,off);off+=c.length;}
  return btoa(String.fromCharCode(...out));
}
async function decode(b64){
  const bytes=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
  const ds=new DecompressionStream("deflate-raw");
  const w=ds.writable.getWriter();w.write(bytes);w.close();
  const chunks=[];const r=ds.readable.getReader();
  while(true){const{done,value}=await r.read();if(done)break;chunks.push(value);}
  const total=new Uint8Array(chunks.reduce((a,c)=>a+c.length,0));
  let off=0;for(const c of chunks){total.set(c,off);off+=c.length;}
  return JSON.parse(new TextDecoder().decode(total));
}
const mkConn=dc=>{
  const cbs={};
  dc.onmessage=e=>cbs.data?.(JSON.parse(e.data));
  return{send:d=>dc.send(JSON.stringify(d)),on:(ev,cb)=>{cbs[ev]=cb;}};
};

function MPLobby({onStart,onBack}){
  const[step,setStep]=useState("menu");
  const[offerCode,setOfferCode]=useState("");
  const[answerCode,setAnswerCode]=useState("");
  const[inputCode,setInputCode]=useState("");
  const[status,setStatus]=useState("");
  const[myCls,setMyCls]=useState(null);
  const[oppClsRcv,setOppClsRcv]=useState(null);
  const pcRef=useRef(null);const dcRef=useRef(null);
  const myClsRef=useRef(null);const roleRef=useRef(null);

  const setupDC=(dc,role)=>{
    dcRef.current=dc;
    dc.onopen=()=>{
      setStatus("");
      setStep(s=>s==="host_offer"?"host_conn":s==="join_answer"?"join_conn":s);
      if(role==="host"){
        // Actively request guest's class — don't rely on guest sending it unprompted
        dc.send(JSON.stringify({type:"REQUEST_CLASS"}));
      }
      if(role==="guest"){
        // Re-send class if already picked, otherwise wait for REQUEST_CLASS
        if(myClsRef.current)dc.send(JSON.stringify({type:"GUEST_CLASS",cls:myClsRef.current}));
      }
    };
    dc.onmessage=e=>{
      const msg=JSON.parse(e.data);
      if(msg.type==="REQUEST_CLASS"){
        // Host asked for our class — send it if we have it, otherwise it'll be sent when we pick
        if(myClsRef.current)dc.send(JSON.stringify({type:"GUEST_CLASS",cls:myClsRef.current}));
      }
      if(msg.type==="GUEST_CLASS")setOppClsRcv(msg.cls);
      if(msg.type==="GAME_START"){onStart({auth:msg.auth,pi:1,isHost:false,conn:mkConn(dc)});}
    };
    dc.onerror=e=>setStatus("Channel error: "+(e.message||e));
  };

  const doHost=async()=>{
    roleRef.current="host";setStatus("Generating offer — please wait (~5s)…");
    const pc=new RTCPeerConnection(ICE);pcRef.current=pc;
    const dc=pc.createDataChannel("cw");setupDC(dc,"host");
    const offer=await pc.createOffer();await pc.setLocalDescription(offer);
    await waitIce(pc);
    setOfferCode(await encode({type:pc.localDescription.type,sdp:pc.localDescription.sdp}));
    setStep("host_offer");setStatus("");
  };

  const submitAnswer=async()=>{
    if(!inputCode.trim())return;
    try{
      await pcRef.current.setRemoteDescription(await decode(inputCode.trim()));
      setStatus("Connecting…");setInputCode("");
    }catch{setStatus("Invalid code — check you pasted the right one.");}
  };

  const doJoin=()=>{roleRef.current="guest";setStep("join_offer");};

  const submitOffer=async()=>{
    if(!inputCode.trim())return;
    setStatus("Generating answer — please wait (~5s)…");
    try{
      const pc=new RTCPeerConnection(ICE);pcRef.current=pc;
      pc.ondatachannel=e=>setupDC(e.channel,"guest");
      await pc.setRemoteDescription(await decode(inputCode.trim()));
      const ans=await pc.createAnswer();await pc.setLocalDescription(ans);
      await waitIce(pc);
      setAnswerCode(await encode({type:pc.localDescription.type,sdp:pc.localDescription.sdp}));
      setStep("join_answer");setInputCode("");setStatus("");
    }catch(e){setStatus("Error: "+e.message);}
  };

  const pickCls=id=>{
    myClsRef.current=id;setMyCls(id);
    // Send immediately if channel already open (covers all timing cases)
    if(roleRef.current==="guest"&&dcRef.current?.readyState==="open")
      dcRef.current.send(JSON.stringify({type:"GUEST_CLASS",cls:id}));
  };

  useEffect(()=>{
    if(roleRef.current!=="host"||!myCls||!oppClsRcv)return;
    const auth=initAuth(myCls,oppClsRcv);
    dcRef.current.send(JSON.stringify({type:"GAME_START",auth}));
    onStart({auth,pi:0,isHost:true,conn:mkConn(dcRef.current)});
  },[myCls,oppClsRcv]);

  const Inp=({label,ph,onSub,btn})=>(
    <div style={{marginBottom:12}}>
      <div style={{fontSize:10,color:"#6b7280",marginBottom:4}}>{label}</div>
      <div style={{display:"flex",gap:6}}>
        <textarea value={inputCode} onChange={e=>setInputCode(e.target.value)} rows={3} placeholder={ph} style={{flex:1,background:"#0a0818",border:"1px solid #2d2b55",borderRadius:4,color:"#e0e0f0",fontFamily:"monospace",fontSize:10,padding:6,resize:"none"}}/>
        <button onClick={onSub} style={{padding:"4px 10px",background:"#1c0a2e",border:"1px solid #7c3aed",borderRadius:4,color:"#c084fc",cursor:"pointer",fontFamily:"monospace",fontSize:10,alignSelf:"flex-start"}}>{btn}</button>
      </div>
    </div>
  );

  const Note=({t,c="#fbbf24"})=>t?<div style={{marginBottom:10,fontSize:11,color:c}}>{t}</div>:null;

  return(
    <div style={{fontFamily:"monospace",background:"#1a1a2e",minHeight:"100vh",color:"#e0e0f0",padding:24}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}>
        <button onClick={step==="menu"?onBack:()=>setStep("menu")} style={{padding:"5px 12px",background:"#12101f",border:"1px solid #2d2b55",borderRadius:4,color:"#6b7280",cursor:"pointer",fontFamily:"monospace",fontSize:12}}>← Back</button>
        <h2 style={{color:"#34d399",margin:0}}>👥 Multiplayer</h2>
      </div>
      <p style={{fontSize:11,color:"#6b7280",marginBottom:20}}>Direct browser↔browser via WebRTC. You'll exchange two short codes — no account needed.</p>

      {step==="menu"&&(
        <div style={{display:"flex",gap:12}}>
          <button onClick={doHost} style={{padding:"12px 24px",background:"#0a2010",border:"2px solid #34d399",borderRadius:8,color:"#34d399",cursor:"pointer",fontSize:14,fontFamily:"monospace"}}>🏠 Host Game</button>
          <button onClick={doJoin} style={{padding:"12px 24px",background:"#1c0a2e",border:"2px solid #7c3aed",borderRadius:8,color:"#c084fc",cursor:"pointer",fontSize:14,fontFamily:"monospace"}}>🔗 Join Game</button>
        </div>
      )}

      {step==="host_offer"&&<>
        <Note t="Step 1 — Send your offer code to your opponent:"/>
        <CodeBox code={offerCode} label="OFFER CODE"/>
        <Note t="Step 2 — Paste the answer code they send back:"/>
        <Inp label="ANSWER CODE" ph="Paste opponent's answer…" onSub={submitAnswer} btn="Submit →"/>
        <Note t={status}/>
      </>}

      {step==="host_conn"&&<>
        <Note t="✓ Connected!" c="#34d399"/>
        {!myCls&&<><div style={{fontSize:11,color:"#6b7280"}}>Pick your class:</div><ClassGrid onPick={pickCls}/></>}
        {myCls&&!oppClsRcv&&<Note t="Waiting for opponent to pick their class…" c="#6b7280"/>}
      </>}

      {step==="join_offer"&&<>
        <Note t="Step 1 — Paste the host's offer code:"/>
        <Inp label="OFFER CODE" ph="Paste host's offer…" onSub={submitOffer} btn="Process →"/>
        <Note t={status}/>
      </>}

      {step==="join_answer"&&<>
        <Note t="Step 2 — Send this answer code to the host:"/>
        <CodeBox code={answerCode} label="ANSWER CODE"/>
        <Note t="Waiting for host to confirm… meanwhile pick your class:"/>
        {!myCls?<ClassGrid onPick={pickCls}/>:<Note t="✓ Class chosen. Waiting for host to start…" c="#34d399"/>}
      </>}

      {step==="join_conn"&&<>
        <Note t="✓ Connected!" c="#34d399"/>
        {!myCls&&<><div style={{fontSize:11,color:"#6b7280"}}>Pick your class:</div><ClassGrid onPick={pickCls}/></>}
        {myCls&&<Note t="✓ Ready. Waiting for host to start…" c="#34d399"/>}
      </>}
    </div>
  );
}

  const[exchIds,setExchIds]=useState(new Set());
  const[treeFor,setTreeFor]=useState(null);
  const dragRef=useRef(null);
  // Internal 10-second challenge countdown — works for both solo and MP
  const isChallengeable_=auth?.turnPhase==="challenge"&&!!auth?.lastPlay&&auth?.lastPlay?.pi!==myPI;
  const[chalCD,setChalCD]=useState(0);
  const chalCDRef=useRef(null);
  useEffect(()=>{
    if(isChallengeable_){
      setChalCD(10);
      chalCDRef.current=setInterval(()=>{
        setChalCD(n=>{
          if(n<=1){clearInterval(chalCDRef.current);onAction({type:"PASS"});return 0;}
          return n-1;
        });
      },1000);
    }else{clearInterval(chalCDRef.current);setChalCD(0);}
    return()=>clearInterval(chalCDRef.current);
  },[isChallengeable_]);

  const v=getView(auth,myPI);
  if(!v)return null;

  const{myClass:mc,oppClass:oc,myHand,oppHandDisplay,myGY,myHP,myMaxHP,oppHP,oppMaxHP,
        myMana,myXP,myUA,oppUA,mySecret,myPLU,myFade,mySBCool,myLightArmed,myFireArmed,myIceArmed,
        myMantis,myTiger,myCrane,mySnake,oppDisabled,isMyTurn,isChallengeable,myCraneRed,mySBMode,
        board,log,classIds,disabledUA}=v;

  const oi=1-myPI;
  const oCls=CLS[classIds[oi]];
  const isPlayerOwner=own=>own===(myPI===0?"p0":"p1");
  const preview=staged.length?validatePlace(staged,board,auth.isFirstWord[myPI]):null;
  const usedIds=new Set(staged.map(p=>p.handId));
  const blocked=!isMyTurn||auth.turnPhase==="challenge";
  const gameOver=myHP<=0||oppHP<=0;
  const turnPhase=auth.turnPhase;
  const lastPlay=auth.lastPlay;

  if(treeFor)return<TechTree cls={CLS[treeFor]} onClose={()=>setTreeFor(null)}/>;

  const doPlay=()=>{
    const val=validatePlace(staged,board,auth.isFirstWord[myPI]);
    if(!val.ok)return;
    onAction({type:"PLAY_WORD",staged});
    setStaged([]);setExchMode(false);setExchIds(new Set());
  };
  const doExchange=()=>{
    if(!exchIds.size)return;
    const ids=[...exchIds],all=ids.length===myHand.length;
    onAction({type:"EXCHANGE",ids,all});
    setExchMode(false);setExchIds(new Set());setStaged([]);
  };
  const doChallenge=()=>onAction({type:"CHALLENGE"});
  const doPass=()=>onAction({type:"PASS"});
  const doChooseAbility=id=>onAction({type:"CHOOSE_ABILITY",abilityId:id});
  const doArm=sp=>onAction({type:"ARM",spell:sp});
  const doToggleStyle=style=>onAction({type:"TOGGLE_STYLE",style});
  const doActivateSB=()=>onAction({type:"ACTIVATE_SMOKE"});

  const dropOnCell=(la,r,c)=>{
    const id=dragRef.current;if(!id)return;dragRef.current=null;
    if(mySBMode){
      if(board[la][r][c].letter&&isPlayerOwner(board[la][r][c].owner))onAction({type:"SMOKE_BOMB",layer:la,row:r,col:c});
      return;
    }
    if(board[la][r][c].letter&&!staged.some(p=>p.layer===la&&p.row===r&&p.col===c))return;
    if(id.startsWith("board:")){
      const[,coords]=id.split(":");const[sl,sr,sc]=coords.split(",").map(Number);
      const ex=staged.find(p=>p.layer===sl&&p.row===sr&&p.col===sc);
      if(!ex)return;
      setStaged(s=>[...s.filter(p=>!(p.layer===sl&&p.row===sr&&p.col===sc)),{...ex,layer:la,row:r,col:c}]);
      return;
    }
    if(staged.find(p=>p.handId===id))return;
    const tile=[...myHand,...myGY].find(t=>t.id===id);
    if(!tile||tile.frozenTurns>0)return;
    setStaged(s=>[...s,{handId:id,letter:tile.letter,layer:la,row:r,col:c,fromGraveyard:myGY.some(t=>t.id===id),stealthy:tile.stealthy??false}]);
  };
  const clickCell=(la,r,c)=>{
    if(mySBMode){if(board[la][r][c].letter&&isPlayerOwner(board[la][r][c].owner))onAction({type:"SMOKE_BOMB",layer:la,row:r,col:c});return;}
    setStaged(s=>s.filter(p=>!(p.layer===la&&p.row===r&&p.col===c)));
  };

  const StyleBtn=({icon,label,active,onT,color="#f97316"})=>(
    <button onClick={onT} disabled={blocked} style={{padding:"5px 8px",background:active?color:"#12101f",border:`1px solid ${active?color:"#374151"}`,borderRadius:5,color:active?"#fff":"#6b7280",cursor:"pointer",fontFamily:"monospace",fontSize:11,opacity:blocked?.4:1}}>
      {icon} {active?"ON":"OFF"}
    </button>
  );

  return(
    <div style={{fontFamily:"monospace",background:"#1a1a2e",minHeight:"100vh",color:"#e0e0f0",padding:14,boxSizing:"border-box"}}>
      {gameOver&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.9)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}>
          <div style={{background:"#12101f",border:"2px solid #c084fc",borderRadius:16,padding:"40px 48px",textAlign:"center"}}>
            <div style={{fontSize:40}}>{myHP<=0?"💀":"🏆"}</div>
            <div style={{fontSize:22,fontWeight:"bold",color:myHP<=0?"#ef4444":"#86efac",margin:"12px 0"}}>{myHP<=0?"DEFEATED":"VICTORY!"}</div>
            <button onClick={onRestart} style={{padding:"10px 28px",background:"#1c0a2e",border:"2px solid #7c3aed",borderRadius:6,color:"#c084fc",cursor:"pointer",fontSize:14,fontFamily:"monospace"}}>↩ Main Menu</button>
          </div>
        </div>
      )}
      {myPLU&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}>
          <div style={{background:"#12101f",border:`2px solid ${mc.color}`,borderRadius:12,padding:"28px 24px",maxWidth:500,width:"90%"}}>
            <div style={{fontSize:16,fontWeight:"bold",color:mc.color,marginBottom:14}}>⬆ Level {myPLU.level}! Choose:</div>
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              {myPLU.choices.map(ab=>(
                <div key={ab.id} onClick={()=>doChooseAbility(ab.id)} style={{flex:1,minWidth:130,padding:"14px 12px",background:"#1c0a2e",border:`2px solid ${mc.accent}`,borderRadius:8,cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.borderColor=mc.color} onMouseLeave={e=>e.currentTarget.style.borderColor=mc.accent}>
                  <div style={{fontSize:20,marginBottom:4}}>{ab.icon}</div>
                  <div style={{fontSize:13,fontWeight:"bold",color:mc.color,marginBottom:3}}>{ab.name}</div>
                  <div style={{fontSize:10,color:"#9ca3af",lineHeight:1.5}}>{ab.desc}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <span style={{color:"#c084fc",fontSize:16,fontWeight:"bold",letterSpacing:2}}>⚡ CURSE WORDS</span>
        <div style={{display:"flex",gap:8}}>
          {isSolo&&(aiThinking||minionThinking)&&<span style={{fontSize:11,color:oCls.color}}>{minionThinking?"💀 Warrior…":"🤖 Thinking…"}</span>}
          <button onClick={onRestart} style={{padding:"4px 12px",background:"#1c0a2e",border:"1px solid #7c3aed",borderRadius:4,color:"#c084fc",cursor:"pointer",fontSize:11,fontFamily:"monospace"}}>↩ Menu</button>
        </div>
      </div>

      <div style={{display:"flex",gap:10,marginBottom:10}}>
        <HUD label="YOU" cls={mc} hp={myHP} maxHP={myMaxHP} mana={v.classIds[myPI]==="arcanist"?myMana:null} xp={myXP} ua={myUA} side="left" onInfo={()=>setTreeFor(classIds[myPI])}/>
        <div style={{display:"flex",alignItems:"center",fontSize:16,color:"#4b5563",fontWeight:"bold"}}>VS</div>
        <HUD label="OPP" cls={oCls} hp={oppHP} maxHP={oppMaxHP} mana={null} xp={null} ua={oppUA} side="right" onInfo={()=>setTreeFor(classIds[oi])}/>
      </div>

      {/* Opponent hand */}
      <div style={{marginBottom:10,padding:"8px 10px",background:"#12101f",borderRadius:6,border:`1px solid ${oCls.accent}`}}>
        <div style={{fontSize:10,color:"#6b7280",marginBottom:4}}>OPP HAND — {oppHandDisplay.length} tiles</div>
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          {oppHandDisplay.map((t,i)=>(
            <div key={i} style={{width:36,height:40,background:t.burning?"#3d1a00":t.frozenTurns>0?"#0c1a2e":"#1a1a2e",border:`1px solid ${t.burning?"#f97316":t.frozenTurns>0?"#38bdf8":oCls.accent}`,borderRadius:4,display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
              {t.burning&&<span style={{position:"absolute",top:1,right:1,fontSize:7}}>🔥</span>}
              {t.frozenTurns>0&&<span style={{position:"absolute",top:1,left:1,fontSize:7}}>❄{t.frozenTurns}</span>}
              <span style={{fontSize:14,color:"#374151",fontWeight:"bold"}}>?</span>
            </div>
          ))}
        </div>
        {oppDisabled?.length>0&&<div style={{marginTop:5,fontSize:10,color:"#c084fc"}}>🐍 Disabled: {oppDisabled.join(", ")}</div>}
      </div>

      {/* Phase / challenge banner */}
      {turnPhase==="challenge"&&lastPlay&&(
        <div style={{marginBottom:10,padding:"10px 12px",background:"#12101f",borderRadius:6,border:`1px solid ${oCls.accent}`}}>
          <div style={{fontSize:11,marginBottom:6}}>
            <span style={{color:lastPlay.pi===myPI?mc.color:oCls.color}}>P{lastPlay.pi+1}</span>
            <span style={{color:"#9ca3af"}}> played: </span>
            {lastPlay.words.map((w,i)=><span key={i} style={{color:"#e0e0f0",fontWeight:"bold",marginRight:8}}>{lastPlay.pi===myPI?w.word:"???"}</span>)}
            <span style={{color:"#fbbf24"}}>→ {lastPlay.dmg} dmg</span>
          </div>
          {isChallengeable&&(
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <button onClick={doChallenge} style={{padding:"5px 14px",background:"#450a0a",border:"1px solid #dc2626",borderRadius:4,color:"#f87171",cursor:"pointer",fontFamily:"monospace",fontSize:12}}>⚔ Challenge</button>
              <button onClick={doPass} style={{padding:"5px 14px",background:"#12101f",border:"1px solid #374151",borderRadius:4,color:"#6b7280",cursor:"pointer",fontFamily:"monospace",fontSize:12}}>Pass</button>
              {chalCD>0&&<div style={{marginLeft:"auto",width:28,height:28,borderRadius:"50%",border:`2px solid ${chalCD<=3?"#ef4444":"#6b7280"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:chalCD<=3?"#f87171":"#6b7280"}}>{chalCD}</div>}
            </div>
          )}
          {!isChallengeable&&lastPlay.pi===myPI&&<div style={{fontSize:11,color:"#6b7280"}}>Waiting for opponent to challenge or pass…{isSolo&&chalCountdown>0&&` (${chalCountdown}s)`}</div>}
        </div>
      )}
      {!isMyTurn&&turnPhase==="play"&&<div style={{marginBottom:8,padding:"6px 10px",background:"#0a0a1a",borderRadius:4,fontSize:11,color:"#6b7280",border:"1px solid #1e1b4b"}}>Opponent's turn…</div>}
      {isMyTurn&&turnPhase==="play"&&<div style={{marginBottom:8,padding:"6px 10px",background:"#0a1a0a",borderRadius:4,fontSize:11,color:"#34d399",border:"1px solid #166534"}}>Your turn</div>}
      {myFade&&<div style={{marginBottom:6,fontSize:11,color:"#34d399"}}>🌑 Faded — next hit: 0 dmg</div>}
      {myCraneRed>0&&<div style={{marginBottom:6,fontSize:11,color:"#38bdf8"}}>🦢 Crane reduction: -{myCraneRed}</div>}

      {/* Board + side panel */}
      <div style={{display:"flex",gap:12,alignItems:"flex-start",marginBottom:8}}>
        <BoardView board={board} staged={staged} isPlayerOwner={isPlayerOwner} sbMode={mySBMode} onClick={clickCell} onDrop={dropOnCell} onStagedDragStart={(la,r,c)=>{dragRef.current=`board:${la},${r},${c}`;}}/>

        {/* Arcanist spells */}
        {classIds[myPI]==="arcanist"&&(
          <div style={{display:"flex",flexDirection:"column",gap:6,paddingTop:24}}>
            {[{id:"flame_mastery",sp:"fire",icon:"🔥",armed:myFireArmed,col:"#ea580c"},{id:"ice_mastery",sp:"ice",icon:"❄️",armed:myIceArmed,col:"#1d4ed8"},{id:"lightning_mastery",sp:"lightning",icon:"⚡",armed:myLightArmed,col:"#ca8a04"}].filter(a=>myUA.includes(a.id)).map(a=>(
              <div key={a.id} style={{width:90,padding:"7px 8px",borderRadius:7,background:"#12101f",border:`2px solid ${a.armed?"#fde047":a.col}`,opacity:(!a.armed&&myMana<2)||blocked?.4:1}}>
                <div style={{fontSize:11,fontWeight:"bold",color:a.armed?"#fde047":a.col,marginBottom:3}}>{a.icon} {a.sp}</div>
                <div style={{fontSize:9,color:"#6b7280",marginBottom:4}}>2 mana</div>
                <button onClick={()=>doArm(a.sp)} disabled={a.armed||myMana<2||blocked} style={{width:"100%",padding:"3px 0",background:a.armed?"#854d0e":"#12101f",border:`1px solid ${a.col}`,borderRadius:3,color:a.armed?"#fde047":a.col,cursor:"pointer",fontFamily:"monospace",fontSize:10}}>{a.armed?"Armed!":"Use"}</button>
              </div>
            ))}
          </div>
        )}

        {/* Morphologist styles */}
        {classIds[myPI]==="morphologist"&&(
          <div style={{display:"flex",flexDirection:"column",gap:4,paddingTop:24}}>
            {myUA.includes("blind_fury")&&<div style={{fontSize:10,color:"#9ca3af",marginBottom:2}}>🦗 Mantis <StyleBtn icon="" label="" active={myMantis} onT={()=>doToggleStyle("mantis")} color={mc.color}/></div>}
            {myUA.includes("tiger_style")&&<div style={{fontSize:10,color:"#9ca3af",marginBottom:2}}>🐯 Tiger <StyleBtn icon="" label="" active={myTiger} onT={()=>doToggleStyle("tiger")} color="#f59e0b"/></div>}
            {myUA.includes("crane_style")&&<div style={{fontSize:10,color:"#9ca3af",marginBottom:2}}>🦢 Crane <StyleBtn icon="" label="" active={myCrane} onT={()=>doToggleStyle("crane")} color="#38bdf8"/></div>}
            {myUA.includes("snake_style")&&<div style={{fontSize:10,color:"#9ca3af",marginBottom:2}}>🐍 Snake <StyleBtn icon="" label="" active={mySnake} onT={()=>doToggleStyle("snake")} color="#86efac"/></div>}
          </div>
        )}
      </div>

      {/* Validation */}
      {preview&&<div style={{marginBottom:6,padding:"4px 8px",borderRadius:3,fontSize:11,background:preview.ok?"#052e16":"#450a0a",border:`1px solid ${preview.ok?"#16a34a":"#b91c1c"}`,color:preview.ok?"#86efac":"#fca5a5"}}>{preview.ok?"✓ Valid":"✗ "+preview.reason}</div>}

      {/* Secret word */}
      {classIds[myPI]==="dyslexic"&&mySecret&&(
        <div style={{marginBottom:8,padding:"6px 8px",background:"#1a0a00",borderRadius:5,border:"1px dashed #d97706"}}>
          <div style={{fontSize:9,color:"#92400e",letterSpacing:1,marginBottom:3}}>🤯 SECRET WORD (+40 dmg)</div>
          <div style={{display:"flex",gap:3}}>{[...mySecret].map((l,i)=><div key={i} style={{width:22,height:24,background:"#2d1200",border:"1px solid #d97706",borderRadius:3,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:11,fontWeight:"bold",color:"#fbbf24"}}>{l}</span><span style={{fontSize:7,color:"#92400e"}}>{LV[l]}</span></div>)}</div>
        </div>
      )}

      {/* Hand */}
      <div style={{marginBottom:8}} onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();const id=dragRef.current;if(!id?.startsWith("board:"))return;dragRef.current=null;const[,coords]=id.split(":");const[sl,sr,sc]=coords.split(",").map(Number);setStaged(s=>s.filter(p=>!(p.layer===sl&&p.row===sr&&p.col===sc)));}}>
        <div style={{fontSize:10,color:"#6b7280",marginBottom:4}}>YOUR HAND{exchMode&&<span style={{color:"#f59e0b",marginLeft:8}}>— click to select for exchange</span>}</div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
          {myHand.map(t=>{
            const used=usedIds.has(t.id),inEx=exchIds.has(t.id);
            return<TileComp key={t.id} t={t} used={used} inExchange={inEx} isGY={false}
              onClick={()=>{if(exchMode){const n=new Set(exchIds);n.has(t.id)?n.delete(t.id):n.add(t.id);setExchIds(n);}}}
              onDragStart={e=>{dragRef.current=t.id;e.dataTransfer.effectAllowed="move";}}
              onDragEnd={()=>{dragRef.current=null;}}
              disabled={blocked||exchMode}/>;
          })}
        </div>
      </div>

      {/* Graveyard */}
      {classIds[myPI]==="necromancer"&&(
        <div style={{marginBottom:8}}>
          <div style={{fontSize:10,color:"#4338ca",marginBottom:4}}>⚰ GRAVEYARD ({myGY.length}/{gyCap(myUA)})</div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
            {myGY.map(t=>{const used=usedIds.has(t.id);return<TileComp key={t.id} t={t} used={used} inExchange={false} isGY={true}
              onClick={()=>{}}
              onDragStart={e=>{dragRef.current=t.id;e.dataTransfer.effectAllowed="move";}}
              onDragEnd={()=>{dragRef.current=null;}}
              disabled={blocked}/>;
            })}
          </div>
        </div>
      )}

      {/* Smoke bomb */}
      {classIds[myPI]==="shadowblade"&&myUA.includes("smoke_bomb")&&mySBCool===0&&!blocked&&(
        <div style={{marginBottom:8}}>
          {mySBMode?<span style={{fontSize:11,color:"#34d399"}}>💨 Click a board tile to apply smoke bomb</span>:<button onClick={doActivateSB} style={{padding:"5px 12px",background:"#0a1a0a",border:"1px solid #059669",borderRadius:4,color:"#34d399",cursor:"pointer",fontFamily:"monospace",fontSize:11}}>💨 Smoke Bomb</button>}
        </div>
      )}

      {/* Action buttons */}
      <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
        {!exchMode&&<>
          <button onClick={doPlay} disabled={!staged.length||!(preview?.ok)||blocked} style={{padding:"7px 18px",background:"#052e16",border:"1px solid #16a34a",borderRadius:4,color:"#86efac",cursor:"pointer",fontFamily:"monospace",fontSize:12,opacity:(!staged.length||!preview?.ok||blocked)?.35:1}}>✓ Play Word</button>
          <button onClick={()=>setStaged([])} disabled={!staged.length} style={{padding:"7px 14px",background:"#450a0a",border:"1px solid #b91c1c",borderRadius:4,color:"#fca5a5",cursor:"pointer",fontFamily:"monospace",fontSize:12,opacity:!staged.length?.35:1}}>✕ Clear</button>
          <button onClick={()=>{setExchMode(true);setStaged([]);}} disabled={blocked} style={{padding:"7px 14px",background:"#12101f",border:"1px solid #92400e",borderRadius:4,color:"#fb923c",cursor:"pointer",fontFamily:"monospace",fontSize:12,opacity:blocked?.35:1}}>↩ Exchange</button>
        </>}
        {exchMode&&<>
          <button onClick={doExchange} disabled={!exchIds.size} style={{padding:"7px 18px",background:"#422006",border:"1px solid #f59e0b",borderRadius:4,color:"#fbbf24",cursor:"pointer",fontFamily:"monospace",fontSize:12,opacity:!exchIds.size?.35:1}}>↩ Confirm ({exchIds.size})</button>
          <button onClick={()=>{setExchMode(false);setExchIds(new Set());}} style={{padding:"7px 14px",background:"#450a0a",border:"1px solid #b91c1c",borderRadius:4,color:"#fca5a5",cursor:"pointer",fontFamily:"monospace",fontSize:12}}>✕ Cancel</button>
        </>}
      </div>

      {/* Log */}
      {log.length>0&&<div style={{marginTop:4}}><div style={{fontSize:10,color:"#374151",marginBottom:2}}>LOG</div>{log.slice(0,8).map((l,i)=><div key={i} style={{fontSize:10,color:i===0?"#a78bfa":"#4b5563"}}>{l}</div>)}</div>}
    </div>
  );
}

// ── Solo AI wrapper ───────────────────────────────────────────────────────
function SoloGame({c0,c1,onRestart}){
  const[auth,setAuth]=useState(()=>initAuth(c0,c1));
  const[aiThinking,setAiThinking]=useState(false);
  const[minionThinking,setMinionThinking]=useState(false);
  const[chalCountdown,setChalCountdown]=useState(0);
  const chalTimerRef=useRef(null);
  const authRef=useRef(auth);useEffect(()=>{authRef.current=auth;},[auth]);
  const MY=0,AI=1;

  // AI challenge countdown
  const startChalTimer=useCallback(()=>{
    clearInterval(chalTimerRef.current);
    setChalCountdown(10);
    chalTimerRef.current=setInterval(()=>{
      setChalCountdown(n=>{
        if(n<=1){clearInterval(chalTimerRef.current);
          // auto pass
          setAuth(s=>{
            const lp=s.lastPlay;if(!lp||s.turnPhase!=="challenge")return s;
            let dmg=lp.dmg;const ua=s.ua[MY];
            if(ua.includes("platemail")&&lp.words.some(w=>w.word.length>=6))dmg=Math.max(0,dmg-2);
            dmg=Math.max(0,dmg-s.craneRed[MY]);
            if(s.fadeShield[MY])dmg=0;
            const newHP=[...s.hp];newHP[MY]=Math.max(0,newHP[MY]-dmg);
            const nFS=[...s.fadeShield];nFS[MY]=false;
            const nCR=[...s.craneRed];nCR[MY]=0;
            let ns={...s,hp:newHP,fadeShield:nFS,craneRed:nCR,whoseTurn:MY,turnPhase:"play",lastPlay:null,
              log:[`You passed (auto) — ${dmg}dmg`,...s.log].slice(0,20)};
            if(s.ua[AI].includes("skeletal_warrior")&&s.graveyards[AI].length>=2)ns=runMinion(ns,AI);
            return ns;
          });
          return 0;}
        return n-1;});
    },1000);
  },[]);

  // Watch for AI's turn
  useEffect(()=>{
    if(auth.whoseTurn!==AI||auth.turnPhase!=="play"||auth.hp[0]<=0||auth.hp[1]<=0)return;
    setAiThinking(true);
    const t=setTimeout(()=>{
      const s=authRef.current;
      const letters=s.hands[AI].filter(t=>!(t.frozenTurns>0)).map(t=>t.letter);
      const singleJ=Math.random()<.65;
      const result=(singleJ?findAiPlay(letters,s.board,s.isFirstWord[AI],null,true):null)||findAiPlay(letters,s.board,s.isFirstWord[AI]);
      if(!result){
        setAuth(s=>{
          const ret=s.hands[AI].slice(0,3).map(t=>t.letter);
          const nd=[...s.deck,...ret].sort(()=>Math.random()-.5);
          const{h:drawn,d:d2}=drawN(nd,ret.length,s.classIds[AI]);
          const newH=[...s.hands[AI].slice(3),...drawn.map((t,i)=>({...t,id:`ai_ex${Date.now()}_${i}`}))].map(t=>({...t,burning:false,frozenTurns:t.frozenTurns>0?t.frozenTurns-1:0}));
          const newHands=[...s.hands];newHands[AI]=newH;
          // graveyard for necromancer AI
          let newGY=[...s.graveyards];
          if(s.classIds[AI]==="necromancer"){const cap=gyCap(s.ua[AI]),sp=cap-newGY[AI].length;if(sp>0){const add=ret.slice(0,sp).map((l,i)=>({id:`aig${Date.now()}_${i}`,letter:l,stealthy:false}));newGY=[...s.graveyards];newGY[AI]=[...newGY[AI],...add];}}
          return{...s,deck:d2,hands:newHands,graveyards:newGY,whoseTurn:MY,turnPhase:"play",log:["🤖 AI exchanged",...s.log].slice(0,20)};
        });
        setAiThinking(false);
        // minion
        setTimeout(()=>{const s=authRef.current;if(s.ua[MY].includes("skeletal_warrior")&&s.graveyards[MY].length>=2){setMinionThinking(true);setTimeout(()=>{setAuth(s=>runMinion(s,MY));setMinionThinking(false);},900);}},200);
        return;
      }
      setAuth(s=>{
        const handCopy=[...s.hands[AI]];
        for(const p of result.placements){let i=handCopy.findIndex(t=>t.letter===p.letter&&!(t.frozenTurns>0));if(i===-1)i=handCopy.findIndex(t=>t.letter===p.letter);if(i===-1)return{...s,aiThinking:false};handCopy.splice(i,1);}
        const nb=s.board.map(lay=>lay.map(r=>r.map(c=>({...c}))));
        const placed=result.placements.map(p=>{nb[ML][p.row][p.col]={letter:p.letter,owner:"p1",stealthy:false};return{layer:ML,row:p.row,col:p.col};});
        const words=findWords(nb,placed);if(!words.length)return s;
        const dmg=words.reduce((sum,w)=>sum+scW(w.word),0);
        const hs=hSz(s.classIds[AI]);const{h:drawn,d:nd}=drawN(s.deck,Math.max(0,hs-handCopy.length),s.classIds[AI]);
        const newH=[...handCopy,...drawn.map((t,i)=>({...t,id:`ai${Date.now()}_${i}`}))].map(t=>({...t,burning:false,frozenTurns:t.frozenTurns>0?t.frozenTurns-1:0}));
        const newHands=[...s.hands];newHands[AI]=newH;
        return{...s,board:nb,deck:nd,hands:newHands,isFirstWord:s.isFirstWord.map((v,i)=>i===AI?false:v),
          whoseTurn:MY,turnPhase:"challenge",
          lastPlay:{pi:AI,oi:MY,words,cells:placed,dmg,pFire:0,pFreeze:0,pTiger:0,pSnake:0},
          log:[`🤖 AI: "${words[0].word}"${words.length>1?"+":""}→${dmg}dmg`,...s.log].slice(0,20)};
      });
      setAiThinking(false);
    },1200);
    return()=>clearTimeout(t);
  },[auth.whoseTurn,auth.turnPhase]);

  // Watch for challenge phase where it's player's turn to challenge AI
  useEffect(()=>{
    if(auth.turnPhase==="challenge"&&auth.lastPlay?.pi===AI&&auth.hp[0]>0&&auth.hp[1]>0){startChalTimer();}
    else{clearInterval(chalTimerRef.current);setChalCountdown(0);}
    return()=>clearInterval(chalTimerRef.current);
  },[auth.turnPhase,auth.lastPlay?.pi]);

  // After player plays: AI challenges probabilistically
  useEffect(()=>{
    if(auth.turnPhase!=="challenge"||auth.lastPlay?.pi!==MY||auth.hp[0]<=0||auth.hp[1]<=0)return;
    const t=setTimeout(()=>{
      const s=authRef.current;
      if(s.turnPhase!=="challenge"||!s.lastPlay)return;
      const words=s.lastPlay.words;const word=words[0]?.word??"";
      const threshold=word.length>=7?.65:word.length>=6?.4:.25;
      if(Math.random()>threshold){setAuth(s=>processAction(s,{type:"PASS"},AI));return;}
      const cid=s.classIds[MY],ua=s.ua[MY],secret=s.secretWords[MY];
      const invalid=words.filter(w=>!isValid(w.word,cid,ua,secret));
      if(invalid.length){setAuth(s=>processAction(s,{type:"CHALLENGE"},AI));}
      else{setAuth(s=>processAction(s,{type:"PASS"},AI));}
    },1200);
    return()=>clearTimeout(t);
  },[auth.turnPhase,auth.lastPlay?.pi]);

  const handleAction=useCallback(action=>{
    setAuth(s=>processAction(s,action,MY));
  },[]);

  return<GameUI auth={auth} onAction={handleAction} myPI={MY} isSolo={true} aiThinking={aiThinking} minionThinking={minionThinking} chalCountdown={chalCountdown} onRestart={onRestart}/>;
}

// ── Multiplayer Game wrapper ───────────────────────────────────────────────
function MPGame({auth:initAuth,pi,isHost,conn,onRestart}){
  const[auth,setAuth]=useState(initAuth);
  const authRef=useRef(initAuth);useEffect(()=>{authRef.current=auth;},[auth]);

  useEffect(()=>{
    if(!conn)return;
    conn.on("data",msg=>{
      if(msg.type==="STATE")setAuth(msg.auth);
      if(msg.type==="ACTION"&&isHost){
        setAuth(s=>{
          let ns=processAction(s,msg.action,1-pi);
          if(msg.action.type==="EXCHANGE")ns={...ns,whoseTurn:pi};
          conn.send({type:"STATE",auth:ns});
          return ns;
        });
      }
    });
  },[conn,isHost,pi]);

  const handleAction=useCallback(action=>{
    if(isHost){
      setAuth(s=>{
        let ns=processAction(s,action,pi);
        if(action.type==="EXCHANGE")ns={...ns,whoseTurn:1-pi};
        conn?.send({type:"STATE",auth:ns});
        return ns;
      });
    }else{conn?.send({type:"ACTION",action});}
  },[isHost,pi,conn]);

  return<GameUI auth={auth} onAction={handleAction} myPI={pi} isSolo={false} aiThinking={false} minionThinking={false} chalCountdown={0} onRestart={onRestart}/>;
}

// ── Root ──────────────────────────────────────────────────────────────────
function App(){
  const[screen,setScreen]=useState("lobby");
  const[game,setGame]=useState(null);

  const startSolo=(c0,c1)=>setGame({mode:"solo",c0,c1});
  const startMP=({auth,pi,isHost,conn})=>setGame({mode:"mp",auth,pi,isHost,conn});
  const restart=()=>{setGame(null);setScreen("lobby");};

  if(game?.mode==="solo")return<SoloGame c0={game.c0} c1={game.c1} onRestart={restart}/>;
  if(game?.mode==="mp")return<MPGame auth={game.auth} pi={game.pi} isHost={game.isHost} conn={game.conn} onRestart={restart}/>;
  if(screen==="mp")return<MPLobby onStart={startMP}/>;

  return(
    <LobbyScreen
      onSolo={()=>setScreen("solo_pick")}
      onMP={()=>setScreen("mp")}
    />
  );
}

function AppRoot(){
  const[screen,setScreen]=useState("lobby");
  const[soloPick,setSoloPick]=useState(false);
  const[game,setGame]=useState(null);

  const restart=()=>{setSoloPick(false);setGame(null);setScreen("lobby");};

  if(game?.mode==="solo")return<SoloGame c0={game.c0} c1={game.c1} onRestart={restart}/>;
  if(game?.mode==="mp")return<MPGame auth={game.auth} pi={game.pi} isHost={game.isHost} conn={game.conn} onRestart={restart}/>;
  if(soloPick)return<ClassPicker onSelect={(c0,c1)=>setGame({mode:"solo",c0,c1})} onBack={()=>setSoloPick(false)}/>;
  if(screen==="mp")return<MPLobby onStart={({auth,pi,isHost,conn})=>setGame({mode:"mp",auth,pi,isHost,conn})} onBack={()=>setScreen("lobby")}/>;

  return<LobbyScreen onSolo={()=>setSoloPick(true)} onMP={()=>setScreen("mp")}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<AppRoot/>);
</script></body></html>
