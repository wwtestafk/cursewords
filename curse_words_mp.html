function extractWord(board,la,r,c,dir){var wr=r,wc=c;while(true){var nr=dir==="V"?wr-1:wr,nc=dir==="H"?wc-1:wc;if(nr<0||nc<0)break;if(!board[la][nr][nc].letter)break;wr=nr;wc=nc;}var cells=[];while(wr<RW&&wc<CL&&board[la][wr][wc].letter){cells.push({layer:la,row:wr,col:wc});if(dir==="V")wr++;else wc++;}if(cells.length<2)return null;return{word:cells.map(function(c){return board[la][c.row][c.col].letter;}).join(""),cells:cells,dir:dir,layer:la};}

// Returns path info for an L-shaped set of placed tiles, or null if not a valid L-shape.
function getLShapeInfo(placed){
  if(!placed||placed.length<2)return null;
  var layer=placed[0].layer;
  if(placed.some(function(p){return p.layer!==layer;}))return null;
  var posMap={};
  placed.forEach(function(p){posMap[p.row+","+p.col]=p;});
  // Find endpoints (tiles with exactly 1 placed neighbor)
  var ends=placed.filter(function(p){
    var cnt=0;
    [[p.row-1,p.col],[p.row+1,p.col],[p.row,p.col-1],[p.row,p.col+1]].forEach(function(n){if(posMap[n[0]+","+n[1]])cnt++;});
    return cnt===1;
  });
  if(ends.length!==2)return null;
  // Trace path from one end to the other
  var path=[],cur=ends[0],prev=null;
  while(cur){
    path.push(cur);
    var nxt=null;
    [[cur.row-1,cur.col],[cur.row+1,cur.col],[cur.row,cur.col-1],[cur.row,cur.col+1]].forEach(function(n){
      var nb=posMap[n[0]+","+n[1]];
      if(nb&&(!prev||!(nb.row===prev.row&&nb.col===prev.col)))nxt=nb;
    });
    prev=cur;cur=nxt;
  }
  if(path.length!==placed.length)return null;
  // Count direction changes — must be exactly 1
  var turns=0,cornerIdx=-1;
  for(var i=1;i<path.length-1;i++){
    var dr1=path[i].row-path[i-1].row,dc1=path[i].col-path[i-1].col;
    var dr2=path[i+1].row-path[i].row,dc2=path[i+1].col-path[i].col;
    if(dr1!==dr2||dc1!==dc2){turns++;cornerIdx=i;}
  }
  if(turns!==1)return null;
  return{path:path,cornerIdx:cornerIdx,layer:layer};
}

// Expand a set of placed cells by flood-filling adjacent board tiles (same layer).
// This lets an L-shape incorporate existing board tiles into the word path.
function expandStagedForL(staged,board){
  if(!staged.length)return staged;
  var la=staged[0].layer;
  var map={};
  staged.forEach(function(p){map[p.row+","+p.col]={row:p.row,col:p.col,layer:la};});
  var chg=true;
  while(chg){chg=false;
    Object.keys(map).forEach(function(key){
      var p=map[key];
      [[p.row-1,p.col],[p.row+1,p.col],[p.row,p.col-1],[p.row,p.col+1]].forEach(function(n){
        var nk=n[0]+","+n[1];
        if(!map[nk]&&n[0]>=0&&n[0]<RW&&n[1]>=0&&n[1]<CL&&board[la][n[0]][n[1]].letter){map[nk]={row:n[0],col:n[1],layer:la};chg=true;}
      });
    });
  }
  return Object.values(map);
}

function findWords(board,placed,cid,ua){
  if(!placed.length)return[];
  var rows=Array.from(new Set(placed.map(function(p){return p.row;}))),cols=Array.from(new Set(placed.map(function(p){return p.col;})));
  var isH=rows.length===1&&cols.length>0;
  var isV=cols.length===1&&rows.length>0;

  if(!isH&&!isV){
    // L-shape support for Dyslexic Contortionist
    if(cid==="dyslexic"&&ua&&ua.includes("contortionist")&&placed.length>=1){
      var expF=expandStagedForL(placed,board);
      if(expF.length>=5){
        var lsi=getLShapeInfo(expF);
        if(lsi){
          var word=lsi.path.map(function(p){return board[p.layer][p.row][p.col].letter;}).join("");
          if(word.length>=2)return[{word:word,cells:lsi.path.map(function(p){return{layer:p.layer,row:p.row,col:p.col};}),dir:"L",layer:lsi.layer}];
        }
      }
    }
    return[];
  }

  var seen=new Set(),res=[];
  function add(w){if(!w)return;var k=w.layer+"-"+w.dir+"-"+w.cells[0].row+"-"+w.cells[0].col;if(!seen.has(k)){seen.add(k);res.push(w);}}

  add(extractWord(board,p0.layer,p0.row,p0.col,isH?"H":"V"));
  placed.forEach(function(p){add(extractWord(board,p.layer,p.row,p.col,isH?"V":"H"));});
  return res;
}

function validatePlace(staged,board,isFirst,cid,ua){
  if(!staged.length)return{ok:false,reason:"No tiles."};
  var rows=Array.from(new Set(staged.map(function(p){return p.row;}))),cols=Array.from(new Set(staged.map(function(p){return p.col;}))),layers=Array.from(new Set(staged.map(function(p){return p.layer;})));
  var isH=rows.length===1&&cols.length>0,isV=cols.length===1&&rows.length>0;

  if(!isH&&!isV){
    // L-shape path for Dyslexic Contortionist (5+ tiles, exactly one 90° bend)
    if(cid==="dyslexic"&&ua&&ua.includes("contortionist")&&staged.length>=1){
      var expV=expandStagedForL(staged,board);
      if(expV.length>=5){
        var lsi=getLShapeInfo(expV);
        if(!lsi)return{ok:false,reason:"L-shape: need 5+ connected tiles with one 90° bend."};
        var pathSet=new Set(lsi.path.map(function(p){return p.row+","+p.col;}));
        if(!staged.every(function(p){return pathSet.has(p.row+","+p.col);}))return{ok:false,reason:"All placed tiles must lie on the L-path."};
        if(staged.some(function(p){return board[p.layer][p.row][p.col].letter;}))return{ok:false,reason:"Tile already there."};
        if(isFirst){
          var hasTiles=board[ML].some(function(row){return row.some(function(c){return c.letter;});});
          if(!hasTiles){
            if(lsi.layer!==ML)return{ok:false,reason:"First word: layer "+ML+"."};
            if(!lsi.path.some(function(p){return p.row===CR&&p.col===CR;}))return{ok:false,reason:"First word must cross center."};
            return{ok:true,isLShape:true};
          }
        }
        var adj=staged.some(function(p){return[[p.row-1,p.col],[p.row+1,p.col],[p.row,p.col-1],[p.row,p.col+1]].some(function(nr){return nr[0]>=0&&nr[0]<RW&&nr[1]>=0&&nr[1]<CL&&board[p.layer][nr[0]][nr[1]].letter;});});
        if(!adj)return{ok:false,reason:"Must connect to existing tile."};
        return{ok:true,isLShape:true};
      }
    }
    return{ok:false,reason:"Must be a single line."};
  }

  var layer=layers[0];
  var sorted=staged.slice().sort(function(a,b){return isH?a.col-b.col:a.row-b.row;});
  var lo=isH?sorted[0].col:sorted[0].row,hi=isH?sorted[sorted.length-1].col:sorted[sorted.length-1].row;
  for(var i=lo;i<=hi;i++){var r=isH?rows[0]:i,c=isH?i:cols[0];if(!board[layer][r][c].letter&&!staged.some(function(p){return p.row===r&&p.col===c;}))return{ok:false,reason:"Gap at "+(isH?"col":"row")+" "+i+"."};} 
  if(staged.some(function(p){return board[p.layer][p.row][p.col].letter;}))return{ok:false,reason:"Tile already there."};
  if(isFirst){
    var hasTiles=board[ML].some(function(row){return row.some(function(c){return c.letter;});});
    if(!hasTiles){
      if(layer!==ML)return{ok:false,reason:"First word: layer "+ML+"."};
      var ok=isH?rows[0]===CR&&Math.min.apply(null,cols)<=CR&&Math.max.apply(null,cols)>=CR:cols[0]===CR&&Math.min.apply(null,rows)<=CR&&Math.max.apply(null,rows)>=CR;
      if(!ok)return{ok:false,reason:"First word must cross center."};
      return{ok:true};
    }
  }
  var adj=staged.some(function(p){return[[p.row-1,p.col],[p.row+1,p.col],[p.row,p.col-1],[p.row,p.col+1]].some(function(nr){return nr[0]>=0&&nr[0]<RW&&nr[1]>=0&&nr[1]<CL&&board[p.layer][nr[0]][nr[1]].letter;});});
  if(!adj)return{ok:false,reason:"Must connect to existing tile."};
  return{ok:true};
}

function cntAdjLong(board,placed,words,min){min=min||5;var bk=new Set();placed.forEach(function(p){[[p.row-1,p.col],[p.row+1,p.col],[p.row,p.col-1],[p.row,p.col+1]].forEach(function(nr){if(nr[0]>=0&&nr[0]<RW&&nr[1]>=0&&nr[1]<CL&&board[p.layer][nr[0]][nr[1]].letter)bk.add(p.layer+","+nr[0]+","+nr[1]);});});var fk=new Set(words.flatMap(function(w){return w.cells.map(function(c){return c.layer+","+c.row+","+c.col;});}));var cnt=0,counted=new Set();bk.forEach(function(key){if(fk.has(key))return;var pts=key.split(",").map(Number),la=pts[0],r=pts[1],c=pts[2];["H","V"].forEach(function(dir){var w=extractWord(board,la,r,c,dir);if(!w||w.word.length<min)return;var wk=w.layer+"-"+w.dir+"-"+w.cells[0].row+"-"+w.cells[0].col;if(!counted.has(wk)&&w.cells.some(function(wc){return placed.some(function(pc){return Math.abs(pc.row-wc.row)+Math.abs(pc.col-wc.col)===1;});})){counted.add(wk);cnt++;}});});return cnt;}

function findAiPlay(letters,board,isFirst,maxLen,singleJ){

    for(var off=0;off<word.length;off++){if(word[off]!==tile.letter)continue;var sr=tile.r-off;if(sr<0||sr+word.length>RW)continue;var nT=[];var vld=true;for(var i=0;i<word.length;i++){var cell=board[ML][sr+i][tile.c];if(cell.letter){if(cell.letter!==word[i]){vld=false;break;}}else nT.push({row:sr+i,col:tile.c,letter:word[i]});}if(!vld||!nT.length)continue;if(singleJ&&cntJ(nT,board)>1)continue;var pool=av.slice();var lo=true;for(var ti=0;ti<nT.length;ti++){var idx=pool.indexOf(nT[ti].letter);if(idx===-1){lo=false;break;}pool.splice(idx,1);}if(lo)return{word:word,placements:nT};}
  }}return null;
}

function lvUp(s,pi,xpAdd){
  var ua=s.ua.map(function(a){return a.slice();});var plu=s.pendingLU.slice();
  var oldLv=lvX(s.xp[pi]),newXP=s.xp[pi]+xpAdd,newLv=lvX(newXP);
  if(newLv>oldLv){
    var cls=CLS[s.classIds[pi]];
    var choices=cls.abilities.filter(function(ab){
      if(ab.lv!==newLv||ua[pi].includes(ab.id)||ab.notAvailable)return false;
      if(ab.prereqs)return ab.prereqs.every(function(id){return ua[pi].includes(id);});
      if(ab.lv>=3){var hp=cls.abilities.some(function(a){return a.lv===ab.lv-1&&ua[pi].includes(a.id);});if(!hp)return false;}
      return true;
    });
    if(choices.length===1)ua[pi].push(choices[0].id);
    else if(choices.length>1)plu[pi]={level:newLv,choices:choices};
  }
  var newXPs=s.xp.slice();newXPs[pi]=newXP;
  return{ua:ua,plu:plu,newXPs:newXPs};
}

function runMinion(s,pi){
  var letters=s.graveyards[pi].map(function(t){return t.letter;});
  var result=findAiPlay(letters,s.board,false,4);
  if(!result||result.word.length<3)return s;
  var gy=s.graveyards[pi].slice();
  for(var i=0;i<result.placements.length;i++){var idx=gy.findIndex(function(t){return t.letter===result.placements[i].letter;});if(idx===-1)return s;gy.splice(idx,1);}
  var oi=1-pi;var nb=s.board.map(function(lay){return lay.map(function(r){return r.map(function(c){return Object.assign({},c);});});});
  var placed=result.placements.map(function(p){nb[ML][p.row][p.col]={letter:p.letter,owner:pi===0?"p0":"p1",stealthy:false};return{layer:ML,row:p.row,col:p.col};});
  var words=findWords(nb,placed);if(!words.length)return s;
  var dmg=words.reduce(function(sum,w){return sum+scW(w.word);},0);
  var newHP=s.hp.slice();newHP[oi]=Math.max(0,newHP[oi]-dmg);
  var newGY=s.graveyards.slice();newGY[pi]=gy;
  return Object.assign({},s,{board:nb,hp:newHP,graveyards:newGY,log:["💀 Warrior: \""+result.word+"\" -> "+dmg+"dmg"].concat(s.log).slice(0,20)});
}

function processAction(s,action,pi){
  var oi=1-pi;

  if(action.type==="PLAY_WORD"){
    var staged=action.staged;
    var cid=s.classIds[pi],ua=s.ua[pi],secret=s.secretWords[pi];
    var nb=s.board.map(function(lay){return lay.map(function(r){return r.map(function(c){return Object.assign({},c);});});});
    var placed=staged.map(function(p){nb[p.layer][p.row][p.col]={letter:p.letter,owner:pi===0?"p0":"p1",stealthy:!!p.stealthy};return{layer:p.layer,row:p.row,col:p.col};});
    // Pass cid/ua so findWords can handle L-shapes for Contortionist
    var words=findWords(nb,placed,cid,ua);if(!words.length)return s;
    var primary=words[0].word;
    var dmg=0,manaG=0,xpG=0,bonusNotes=[];
    words.forEach(function(w){
      var d=scW(w.word);
      if(cid==="warlord"&&ua.includes("big_word_mastery")&&w.word.length>=6)d+=5;
      if(cid==="warlord"&&ua.includes("syllabic_strikes")){var sy=syl(w.word);if(sy>=3)d+=6;else if(sy===2)d+=2;}
      if(cid==="dyslexic"&&secret&&ua.includes("secret_word")){var vv=gvars(w.word,cid,ua),sv=gvars(secret,cid,ua);if(vv.some(function(v){return sv.some(function(x){return v===x;});}))d+=40;}
      dmg+=d;if(cid==="arcanist")manaG+=Math.max(0,w.word.length-4);xpG+=xpW(w.word);
    });
    if(ua.includes("lightning_mastery"))dmg+=cntAdjLong(nb,placed,words)*5;
    if(s.mantisOn[pi]&&words.length>1)dmg*=2;

    var newHands=s.hands.map(function(h){return h.slice();});
    var newMetalCells=Object.assign({},s.metalCells);
    var onomStealthHand=false;

    if(cid==="dyslexic"&&ua.includes("onomatopoeia")&&isOnom(primary)){
      var onomEffects=["fireball","freeze","metal","stealth"];
      var onomEffect=onomEffects[0|Math.random()*onomEffects.length];
      if(onomEffect==="fireball"){
        var unb=newHands[oi].map(function(t,i){return Object.assign({},t,{_i:i});}).filter(function(t){return !t.burning;});
        var cnt=Math.min(2,unb.length);
        unb.sort(function(){return Math.random()-0.5;}).slice(0,cnt).forEach(function(t){newHands[oi][t._i]=Object.assign({},newHands[oi][t._i],{burning:true});});
        if(cnt>0)bonusNotes.push("💥→🔥 "+cnt+" ignited!");
      } else if(onomEffect==="freeze"){
        var unf=newHands[oi].map(function(t,i){return Object.assign({},t,{_i:i});}).filter(function(t){return !(t.frozenTurns>0);});
        var cnt2=Math.min(2,unf.length);
        unf.sort(function(){return Math.random()-0.5;}).slice(0,cnt2).forEach(function(t){newHands[oi][t._i]=Object.assign({},newHands[oi][t._i],{frozenTurns:2});});
        if(cnt2>0)bonusNotes.push("💥→❄️ "+cnt2+" frozen!");
      } else if(onomEffect==="metal"){
        var mredVal=primary.length>=6?5:primary.length===5?3:primary.length===4?2:1;
        placed.forEach(function(p){newMetalCells[p.layer+","+p.row+","+p.col]=mredVal;});
        bonusNotes.push("💥→⚙️ metallicized!");
      } else if(onomEffect==="stealth"){
        onomStealthHand=true;
        bonusNotes.push("💥→👁 hand stealthed!");
      }
    }

    var oppLUP=s.lastUnchallengedPlay[oi];
    if(cid==="warlord"&&ua.includes("parry")&&oppLUP&&oppLUP.cells&&oppLUP.cells.length){
      var oppCellSet=new Set(oppLUP.cells.map(function(c){return c.layer+","+c.row+","+c.col;}));
      var allFormedCells=words.flatMap(function(w){return w.cells;});
      var connects=placed.some(function(p){
        return[[p.row-1,p.col],[p.row+1,p.col],[p.row,p.col-1],[p.row,p.col+1]].some(function(nr){
          return oppCellSet.has(p.layer+","+nr[0]+","+nr[1]);

      log:["P"+(pi+1)+" played "+logWord+shapeNote+extra+" ->"+dmg+"dmg"+bonusStr].concat(s.log).slice(0,20)});

  if(action.type==="CHALLENGE"){

  if(action.type==="PASS"){

    dmg=Math.max(0,dmg-s.craneRed[pi]);
    if(s.fadeShield[pi])dmg=0;

    var newHands=s.hands.map(function(h){return h.slice();});
    var extraNote="";
    if(lp.pFire>0){var unb=newHands[pi].map(function(t,i){return Object.assign({},t,{_i:i});}).filter(function(t){return !t.burning;});var cnt=Math.min(lp.pFire,unb.length);unb.sort(function(){return Math.random()-0.5;}).slice(0,cnt).forEach(function(t){newHands[pi][t._i]=Object.assign({},newHands[pi][t._i],{burning:true});});if(cnt>0)extraNote+=" 🔥 "+cnt+" ignited!";}
    if(lp.pFreeze>0){var unf=newHands[pi].map(function(t,i){return Object.assign({},t,{_i:i});}).filter(function(t){return !(t.frozenTurns>0);});var cnt2=Math.min(lp.pFreeze,unf.length);unf.sort(function(){return Math.random()-0.5;}).slice(0,cnt2).forEach(function(t){newHands[pi][t._i]=Object.assign({},newHands[pi][t._i],{frozenTurns:2});});if(cnt2>0)extraNote+=" ❄️ "+cnt2+" frozen!";}
    if(lp.pVowel>0){var cons=newHands[pi].map(function(t,i){return Object.assign({},t,{_i:i});}).filter(function(t){return !t.burning&&!(t.frozenTurns>0)&&!VOWELS.includes(t.letter);});var cnt3=Math.min(lp.pVowel,cons.length);cons.sort(function(){return Math.random()-0.5;}).slice(0,cnt3).forEach(function(t){newHands[pi][t._i]=Object.assign({},newHands[pi][t._i],{letter:VOWELS[0|Math.random()*5]});});if(cnt3>0)extraNote+=" 🌊 "+cnt3+" flooded!";}
    if(lp.pTiger>0){var rem=newHands[pi].map(function(t,i){return Object.assign({},t,{_i:i});}).filter(function(t){return !t.burning&&!(t.frozenTurns>0);});var cnt4=Math.min(lp.pTiger,rem.length);var toRm=new Set(rem.sort(function(){return Math.random()-0.5;}).slice(0,cnt4).map(function(t){return t._i;}));newHands[pi]=newHands[pi].filter(function(_,i){return !toRm.has(i);});if(cnt4>0)extraNote+=" 🐯 opp lost "+cnt4+"!";}
    var newDisUA=s.disabledUA.slice();var newDisLeft=s.disabledLeft.slice();

    if(wordUA.includes("fade_into_shadows")&&lp.words.some(function(w){return !isValid(w.word,wordCid,wordUA,wordSecret);}))nFS[lp.pi]=true;
    var nCR=s.craneRed.slice();nCR[pi]=0;
    var ns=Object.assign({},s,{hp:newHP,hands:newHands,fadeShield:nFS,craneRed:nCR,lastUnchallengedPlay:nLUP,
      disabledUA:newDisUA,disabledLeft:newDisLeft,whoseTurn:pi,turnPhase:"play",lastPlay:null,

  if(action.type==="EXCHANGE"){

function gen4Code(){var c="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";return Array.from({length:4},function(){return c[0|Math.random()*c.length];}).join("");}
// Single unified data dispatcher — avoids double-listener from setupConn + game handler
function mkPeerConn(conn){
  var cbs={};
  conn.on("data",function(d){if(cbs.data)cbs.data(d);});
  conn.on("error",function(e){if(cbs.error)cbs.error(e);});
  return{send:function(d){conn.send(d);},on:function(ev,cb){cbs[ev]=cb;},raw:conn};
}

function MPLobby({onStart,onBack}){
  var[step,setStep]=useState("menu");
  var[code,setCode]=useState("");
  var[inputCode,setInputCode]=useState("");
  var[status,setStatus]=useState("");
  var[myCls,setMyCls]=useState(null);
  var[oppClsRcv,setOppClsRcv]=useState(null);
  var peerRef=useRef(null),connRef=useRef(null),connWrapRef=useRef(null);
  var myClsRef=useRef(null),roleRef=useRef(null);

  var cleanup=function(){if(peerRef.current){try{peerRef.current.destroy();}catch(e){}peerRef.current=null;}};

  var setupConn=function(conn,role){
    connRef.current=conn;
    var wrap=mkPeerConn(conn);
    connWrapRef.current=wrap;
    conn.on("open",function(){
      setStep(role==="host"?"host_conn":"join_conn");
      setStatus("");
      if(role==="host")wrap.send({type:"REQUEST_CLASS"});
      if(role==="guest"&&myClsRef.current)wrap.send({type:"GUEST_CLASS",cls:myClsRef.current});
    });
    // Single data handler via the wrap — no duplicate conn.on("data")
    wrap.on("data",function(msg){
      if(msg.type==="REQUEST_CLASS"&&myClsRef.current)wrap.send({type:"GUEST_CLASS",cls:myClsRef.current});
      if(msg.type==="GUEST_CLASS")setOppClsRcv(msg.cls);
    // Once game starts, rewire the wrap's data handler to MPGame
    if(msg.type==="GAME_START")onStart({auth:msg.auth,pi:1,isHost:false,conn:wrap});
    });
    wrap.on("error",function(e){setStatus("Connection error: "+(e.type||"unknown"));});
  };

  var doHost=function(){
    roleRef.current="host";
    var tryCode=function(){
      var nc=gen4Code();setCode(nc);setStep("host_wait");setStatus("Waiting for opponent...");
      var peer=new Peer("cw4-"+nc,{debug:0});peerRef.current=peer;
      peer.on("connection",function(conn){setupConn(conn,"host");});
      peer.on("error",function(e){if(e.type==="unavailable-id"){cleanup();tryCode();}else setStatus("Error: "+(e.type||e.message));});
    };
    tryCode();
  };

  var doJoin=function(){
    var tc=inputCode.trim().toUpperCase();if(tc.length!==4)return;
    roleRef.current="guest";setStatus("Connecting...");
    var peer=new Peer({debug:0});peerRef.current=peer;
    peer.on("open",function(){
      var conn=peer.connect("cw4-"+tc,{reliable:true,serialization:"json"});
      setupConn(conn,"guest");
    });
    peer.on("error",function(e){setStatus("Error: "+(e.type||e.message));});
  };

  var pickCls=function(id){
    myClsRef.current=id;setMyCls(id);
    if(connRef.current&&connRef.current.open)connRef.current.send({type:"GUEST_CLASS",cls:id});
  };

  useEffect(function(){
    if(roleRef.current!=="host"||!myCls||!oppClsRcv)return;
    var auth=initAuth(myCls,oppClsRcv);
    // Strip the empty board before sending — it's ~40KB of nulls and reconstructed on the other side
    var msgAuth=Object.assign({},auth,{board:null});
    connWrapRef.current.send({type:"GAME_START",auth:msgAuth});
    onStart({auth:auth,pi:0,isHost:true,conn:connWrapRef.current});
  },[myCls,oppClsRcv]);

  return(
    <div style={{fontFamily:"monospace",background:"#1a1a2e",minHeight:"100vh",color:"#e0e0f0",padding:24}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}>
        <button onClick={step==="menu"?onBack:function(){setStep("menu");cleanup();}} style={{padding:"5px 12px",background:"#12101f",border:"1px solid #2d2b55",borderRadius:4,color:"#6b7280",cursor:"pointer",fontFamily:"monospace",fontSize:12}}>Back</button>
        <h2 style={{color:"#34d399",margin:0}}>👥 Multiplayer</h2>
      </div>
      <p style={{fontSize:11,color:"#6b7280",marginBottom:20}}>Direct P2P — share a 4-character code with your opponent.</p>
      {step==="menu"&&(
        <div style={{display:"flex",gap:12}}>
          <button onClick={doHost} style={{padding:"12px 24px",background:"#0a2010",border:"2px solid #34d399",borderRadius:8,color:"#34d399",cursor:"pointer",fontSize:14,fontFamily:"monospace"}}>🏠 Host</button>
          <button onClick={function(){setStep("join_input");}} style={{padding:"12px 24px",background:"#1c0a2e",border:"2px solid #7c3aed",borderRadius:8,color:"#c084fc",cursor:"pointer",fontSize:14,fontFamily:"monospace"}}>🔗 Join</button>
        </div>
      )}
      {step==="host_wait"&&(
        <div>
          <div style={{fontSize:11,color:"#fbbf24",marginBottom:14}}>Share this code with your opponent:</div>
          <div style={{fontSize:56,fontWeight:"bold",letterSpacing:16,color:"#34d399",background:"#0a2010",border:"2px solid #34d399",borderRadius:12,padding:"20px 32px",display:"inline-block",marginBottom:16}}>{code}</div>
          <div style={{fontSize:11,color:"#6b7280",marginTop:4}}>{status}</div>
        </div>
      )}
      {step==="join_input"&&(
        <div>
          <div style={{fontSize:11,color:"#fbbf24",marginBottom:10}}>Enter the host's 4-character code:</div>
          <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:8}}>
            <input value={inputCode} onChange={function(e){setInputCode(e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,"").slice(0,4));}}
              placeholder="XXXX" maxLength={4}
              style={{width:140,padding:"10px 14px",background:"#0a0818",border:"2px solid #7c3aed",borderRadius:8,color:"#c084fc",fontFamily:"monospace",fontSize:32,fontWeight:"bold",letterSpacing:12,textAlign:"center",outline:"none"}}
              onKeyDown={function(e){if(e.key==="Enter")doJoin();}}
            />
            <button onClick={doJoin} disabled={inputCode.length!==4} style={{padding:"10px 22px",background:"#1c0a2e",border:"2px solid #7c3aed",borderRadius:6,color:"#c084fc",cursor:inputCode.length===4?"pointer":"default",fontFamily:"monospace",fontSize:13,opacity:inputCode.length===4?1:0.4}}>Connect</button>
          </div>
          {status&&<div style={{fontSize:11,color:"#fbbf24"}}>{status}</div>}
        </div>
      )}
      {(step==="host_conn"||step==="join_conn")&&(
        <div>
          <div style={{fontSize:12,color:"#34d399",marginBottom:10}}>✓ Connected!</div>
          {!myCls&&(<div><div style={{fontSize:11,color:"#6b7280",marginBottom:6}}>Pick your class:</div><ClassGrid onPick={pickCls}/></div>)}
          {myCls&&step==="host_conn"&&!oppClsRcv&&<div style={{fontSize:11,color:"#6b7280"}}>Waiting for opponent to choose class...</div>}
          {myCls&&step==="join_conn"&&<div style={{fontSize:11,color:"#34d399"}}>Class chosen. Waiting for host...</div>}
        </div>
      )}
    </div>
  );
}

                  <span style={{color:isDis?"#6b7280":"#6b7280",fontSize:10,textDecoration:isDis?"line-through":"none"}}>{x.label}</span>
                </div>
              );})}

      </div>

      {preview&&<div style={{marginBottom:6,padding:"4px 8px",borderRadius:3,fontSize:11,background:preview.ok?"#052e16":"#450a0a",border:"1px solid "+(preview.ok?"#16a34a":"#b91c1c"),color:preview.ok?"#86efac":"#fca5a5"}}>{preview.ok?(preview.isLShape?"🤸 Valid L-shape":"Valid"):"✗ "+preview.reason}</div>}

      {classIds[myPI]==="dyslexic"&&mySecret&&(<div style={{marginBottom:8,padding:"6px 8px",background:"#1a0a00",borderRadius:5,border:"1px dashed #d97706"}}><div style={{fontSize:9,color:"#92400e",letterSpacing:1,marginBottom:3}}>🤯 SECRET WORD (+40 dmg)</div><div style={{display:"flex",gap:3}}>{mySecret.split("").map(function(l,i){return <div key={i} style={{width:22,height:24,background:"#2d1200",border:"1px solid #d97706",borderRadius:3,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:11,fontWeight:"bold",color:"#fbbf24"}}>{l}</span><span style={{fontSize:7,color:"#92400e"}}>{LV[l]}</span></div>;})}</div></div>)}

      <div style={{marginBottom:8}} onDragOver={function(e){e.preventDefault();}} onDrop={function(e){e.preventDefault();var id=dragRef.current;if(!id||!id.startsWith("board:"))return;dragRef.current=null;var coords=id.split(":")[1].split(",").map(Number);setStaged(function(s){return s.filter(function(p){return !(p.layer===coords[0]&&p.row===coords[1]&&p.col===coords[2]);});});}}>
        <div style={{fontSize:10,color:"#6b7280",marginBottom:4}}>YOUR HAND{exchMode&&<span style={{color:"#f59e0b",marginLeft:8}}>— click to select</span>}</div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
          {myHand.map(function(t){var used=usedIds.has(t.id),inEx=exchIds.has(t.id);return <TileComp key={t.id} t={t} used={used} inExchange={inEx} isGY={false} onClick={function(){if(exchMode){var n=new Set(exchIds);n.has(t.id)?n.delete(t.id):n.add(t.id);setExchIds(n);}}} onDragStart={function(e){dragRef.current=t.id;e.dataTransfer.effectAllowed="move";}} onDragEnd={function(){dragRef.current=null;}} disabled={blocked||exchMode}/>;
          })}
        </div>
      </div>

      {classIds[myPI]==="necromancer"&&(<div style={{marginBottom:8}}><div style={{fontSize:10,color:"#4338ca",marginBottom:4}}>⚰ GRAVEYARD ({myGY.length}/{gyCap(myUA)})</div><div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{myGY.map(function(t){var used=usedIds.has(t.id);return <TileComp key={t.id} t={t} used={used} inExchange={false} isGY={true} onClick={function(){}} onDragStart={function(e){dragRef.current=t.id;e.dataTransfer.effectAllowed="move";}} onDragEnd={function(){dragRef.current=null;}} disabled={blocked}/>;})}</div>
        {myUA.includes("bone_blast")&&(
          <div style={{marginTop:8,display:"flex",alignItems:"center",gap:8}}>
            <div style={{padding:"6px 10px",borderRadius:6,background:"#0a0818",border:"2px solid "+(v.myBoneBlastArmed?"#fde047":"#818cf8"),opacity:(!blocked)?1:0.4,width:110}}>
              <div style={{fontSize:11,fontWeight:"bold",color:v.myBoneBlastArmed?"#fde047":"#818cf8",marginBottom:2}}>🦴 BONE BLAST</div>
              <div style={{fontSize:9,color:"#6b7280",marginBottom:4}}>Free — arm then play</div>
              <button onClick={function(){onAction({type:"ARM",spell:"bone_blast"});}} disabled={v.myBoneBlastArmed||blocked} style={{width:"100%",padding:"3px 0",background:v.myBoneBlastArmed?"#1e1b4b":"#12101f",border:"1px solid #818cf8",borderRadius:3,color:v.myBoneBlastArmed?"#fde047":"#818cf8",cursor:(!v.myBoneBlastArmed&&!blocked)?"pointer":"default",fontFamily:"monospace",fontSize:10}}>{v.myBoneBlastArmed?"Armed!":"Arm"}</button>
            </div>
            {v.myBoneBlastArmed&&<div style={{fontSize:10,color:"#818cf8"}}>+3 dmg per graveyard tile used</div>}
          </div>
        )}
      </div>)}

      {classIds[myPI]==="shadowblade"&&myUA.includes("smoke_bomb")&&mySBCool===0&&!blocked&&(<div style={{marginBottom:8}}>{mySBMode?<span style={{fontSize:11,color:"#34d399"}}>💨 Click a board tile</span>:<button onClick={function(){onAction({type:"ACTIVATE_SMOKE"});}} style={{padding:"5px 12px",background:"#0a1a0a",border:"1px solid #059669",borderRadius:4,color:"#34d399",cursor:"pointer",fontFamily:"monospace",fontSize:11}}>💨 Smoke Bomb</button>}</div>)}

      <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
        {!exchMode&&(<React.Fragment>
          <button onClick={doPlay} disabled={!staged.length||!(preview&&preview.ok)||blocked} style={{padding:"7px 18px",background:"#052e16",border:"1px solid #16a34a",borderRadius:4,color:"#86efac",cursor:"pointer",fontFamily:"monospace",fontSize:12,opacity:(!staged.length||!(preview&&preview.ok)||blocked)?0.35:1}}>✓ Play</button>
          <button onClick={function(){setStaged([]);}} disabled={!staged.length} style={{padding:"7px 14px",background:"#450a0a",border:"1px solid #b91c1c",borderRadius:4,color:"#fca5a5",cursor:"pointer",fontFamily:"monospace",fontSize:12,opacity:!staged.length?0.35:1}}>✕ Clear</button>
          <button onClick={function(){setExchMode(true);setStaged([]);}} disabled={blocked} style={{padding:"7px 14px",background:"#12101f",border:"1px solid #92400e",borderRadius:4,color:"#fb923c",cursor:"pointer",fontFamily:"monospace",fontSize:12,opacity:blocked?0.35:1}}>↩ Exchange</button>
        </React.Fragment>)}
        {exchMode&&(<React.Fragment>
          <button onClick={doExchange} disabled={!exchIds.size} style={{padding:"7px 18px",background:"#422006",border:"1px solid #f59e0b",borderRadius:4,color:"#fbbf24",cursor:"pointer",fontFamily:"monospace",fontSize:12,opacity:!exchIds.size?0.35:1}}>↩ Confirm ({exchIds.size})</button>
          <button onClick={function(){setExchMode(false);setExchIds(new Set());}} style={{padding:"7px 14px",background:"#450a0a",border:"1px solid #b91c1c",borderRadius:4,color:"#fca5a5",cursor:"pointer",fontFamily:"monospace",fontSize:12}}>✕ Cancel</button>

function SoloGame({c0,c1,onRestart}){
  var[auth,setAuth]=useState(function(){return initAuth(c0,c1);});
  var[aiThinking,setAiThinking]=useState(false);
  var[minionThinking,setMinionThinking]=useState(false);
  var authRef=useRef(auth);
  useEffect(function(){authRef.current=auth;},[auth]);
  var MY=0,AI=1;

  useEffect(function(){
    if(auth.whoseTurn!==AI||auth.turnPhase!=="play"||auth.hp[0]<=0||auth.hp[1]<=0)return;
    setAiThinking(true);
    var t=setTimeout(function(){
      var s=authRef.current;
      var letters=s.hands[AI].filter(function(t){return !(t.frozenTurns>0);}).map(function(t){return t.letter;});
      var singleJ=Math.random()<0.65;
      var result=(singleJ?findAiPlay(letters,s.board,s.isFirstWord[AI],null,true):null)||findAiPlay(letters,s.board,s.isFirstWord[AI]);
      if(!result){
        setAuth(function(s){
          var ret=s.hands[AI].slice(0,3).map(function(t){return t.letter;});
          var nd=s.deck.concat(ret).sort(function(){return Math.random()-0.5;});
          var drawn=drawN(nd,ret.length,s.classIds[AI]);
          var newH=s.hands[AI].slice(3).concat(drawn.h.map(function(t,i){return Object.assign({},t,{id:"ai_ex"+Date.now()+"_"+i});})).map(function(t){return Object.assign({},t,{burning:false,frozenTurns:t.frozenTurns>0?t.frozenTurns-1:0});});
          var newHands=s.hands.slice();newHands[AI]=newH;
          var newGY=s.graveyards.slice();
          if(s.classIds[AI]==="necromancer"){var cap=gyCap(s.ua[AI]),sp=cap-newGY[AI].length;if(sp>0){var add=ret.slice(0,sp).map(function(l,i){return{id:"aig"+Date.now()+"_"+i,letter:l,stealthy:false};});newGY=s.graveyards.slice();newGY[AI]=newGY[AI].concat(add);}}
          return Object.assign({},s,{deck:drawn.d,hands:newHands,graveyards:newGY,whoseTurn:MY,turnPhase:"play",log:["🤖 AI exchanged"].concat(s.log).slice(0,20)});
        });
        setAiThinking(false);return;
      }
      setAuth(function(s){
        var handCopy=s.hands[AI].slice();
        for(var i=0;i<result.placements.length;i++){var p=result.placements[i];var idx=handCopy.findIndex(function(t){return t.letter===p.letter&&!(t.frozenTurns>0);});if(idx===-1)idx=handCopy.findIndex(function(t){return t.letter===p.letter;});if(idx===-1)return s;handCopy.splice(idx,1);}
        var nb=s.board.map(function(lay){return lay.map(function(r){return r.map(function(c){return Object.assign({},c);});});});
        var placed=result.placements.map(function(p){nb[ML][p.row][p.col]={letter:p.letter,owner:"p1",stealthy:false};return{layer:ML,row:p.row,col:p.col};});
        var words=findWords(nb,placed,s.classIds[AI],s.ua[AI]);if(!words.length)return s;
        var dmg=words.reduce(function(sum,w){return sum+scW(w.word);},0);
        var hs=hSz(s.classIds[AI]);var drawn=drawN(s.deck,Math.max(0,hs-handCopy.length),s.classIds[AI]);
        var newH=handCopy.concat(drawn.h.map(function(t,i){return Object.assign({},t,{id:"ai"+Date.now()+"_"+i});})).map(function(t){return Object.assign({},t,{burning:false,frozenTurns:t.frozenTurns>0?t.frozenTurns-1:0});});
        var newHands=s.hands.slice();newHands[AI]=newH;
        return Object.assign({},s,{board:nb,deck:drawn.d,hands:newHands,isFirstWord:s.isFirstWord.map(function(v,i){return i===AI?false:v;}),whoseTurn:MY,turnPhase:"challenge",lastPlay:{pi:AI,oi:MY,words:words,cells:placed,dmg:dmg,pFire:0,pFreeze:0,pTiger:0,pSnake:0,pVowel:0},log:["🤖 AI: \""+words[0].word+"\""+(words.length>1?"+":"")+"->"+dmg+"dmg"].concat(s.log).slice(0,20)});
      });
      setAiThinking(false);
    },1200);
    return function(){clearTimeout(t);};
  },[auth.whoseTurn,auth.turnPhase]);

  useEffect(function(){
    if(auth.turnPhase!=="challenge"||!auth.lastPlay||auth.lastPlay.pi!==MY||auth.hp[0]<=0||auth.hp[1]<=0)return;
    var t=setTimeout(function(){
      var s=authRef.current;if(s.turnPhase!=="challenge"||!s.lastPlay)return;
      var words=s.lastPlay.words;var word=words[0]?words[0].word:"";
      var threshold=word.length>=7?0.65:word.length>=6?0.4:0.25;
      var willMinion=s.ua[MY].includes("skeletal_warrior")&&s.graveyards[MY].length>=2;
      if(Math.random()>threshold){
        if(willMinion)setMinionThinking(true);
        setAuth(function(s){return processAction(s,{type:"PASS"},AI);});
        if(willMinion)setTimeout(function(){setMinionThinking(false);},800);
        return;
      }
      var cid=s.classIds[MY],ua=s.ua[MY],secret=s.secretWords[MY];
      var invalid=words.filter(function(w){return !isValid(w.word,cid,ua,secret);});
      if(invalid.length){
        setAuth(function(s){return processAction(s,{type:"CHALLENGE"},AI);});
      } else {
        if(willMinion)setMinionThinking(true);
        setAuth(function(s){return processAction(s,{type:"PASS"},AI);});
        if(willMinion)setTimeout(function(){setMinionThinking(false);},800);
      }
    },1200);
    return function(){clearTimeout(t);};
  },[auth.turnPhase,auth.lastPlay&&auth.lastPlay.pi]);

  var handleAction=useCallback(function(action){setAuth(function(s){return processAction(s,action,MY);});});
  return <GameUI auth={auth} onAction={handleAction} myPI={MY} isSolo={true} aiThinking={aiThinking} minionThinking={minionThinking} onRestart={onRestart}/>;
}

function MPGame({auth:initA,pi,isHost,conn,onRestart}){
  var[auth,setAuth]=useState(initA);var authRef=useRef(initA);
  useEffect(function(){authRef.current=auth;},[auth]);
  useEffect(function(){if(!conn)return;conn.on("data",function(msg){if(msg.type==="STATE")setAuth(msg.auth);if(msg.type==="ACTION"&&isHost){setAuth(function(s){var ns=processAction(s,msg.action,1-pi);conn.send({type:"STATE",auth:ns});return ns;});}});},[conn,isHost,pi]);
  var handleAction=useCallback(function(action){if(isHost){setAuth(function(s){var ns=processAction(s,action,pi);conn&&conn.send({type:"STATE",auth:ns});return ns;});}else conn&&conn.send({type:"ACTION",action:action});});
  return <GameUI auth={auth} onAction={handleAction} myPI={pi} isSolo={false} aiThinking={false} minionThinking={false} onRestart={onRestart}/>;
}

function AppRoot(){
  var[screen,setScreen]=useState("lobby"),[soloPick,setSoloPick]=useState(false),[game,setGame]=useState(null);
  var restart=function(){setSoloPick(false);setGame(null);setScreen("lobby");};
  if(game&&game.mode==="solo")return <SoloGame c0={game.c0} c1={game.c1} onRestart={restart}/>;
  if(game&&game.mode==="mp")return <MPGame auth={game.auth} pi={game.pi} isHost={game.isHost} conn={game.conn} onRestart={restart}/>;
  if(soloPick)return <ClassPicker onSelect={function(c0,c1){setGame({mode:"solo",c0:c0,c1:c1});}} onBack={function(){setSoloPick(false);}}/>;
  if(screen==="mp")return <MPLobby onStart={function(o){setGame({mode:"mp",auth:o.auth,pi:o.pi,isHost:o.isHost,conn:o.conn});}} onBack={function(){setScreen("lobby");}}/>;
  return <LobbyScreen onSolo={function(){setSoloPick(true);}} onMP={function(){setScreen("mp");}}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<ErrBound><AppRoot/></ErrBound>);
</script></body></html>
